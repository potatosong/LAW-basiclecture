<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>뽀모도로 타이머</title>
<meta name="theme-color" content="#6b7f95">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="뽀모도로">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='90'>🍅</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root[data-theme="dark"] {
    --stage: #15161b;
    --card: #1a1b21;
    --text: #e9e7e2; --sub: #8b8a8c;
    --track: rgba(255,255,255,0.07);
    --chip: transparent; --chip-active: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.09);
    --border-soft: rgba(255,255,255,0.05);
  }
  :root[data-theme="light"] {
    --stage: #f7f5f1;
    --card: #fbfaf8;
    --text: #2b2a28; --sub: #8a8681;
    --track: rgba(43,42,40,0.07);
    --chip: transparent; --chip-active: rgba(43,42,40,0.05);
    --border: rgba(43,42,40,0.10);
    --border-soft: rgba(43,42,40,0.06);
  }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: var(--stage);
    color: var(--text);
    transition: background 0.5s ease, color 0.3s ease;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  @media (max-width: 1023px) {
    body { overflow: auto; }
  }
  .sub { color: var(--sub); }
  .chip {
    background: var(--chip); color: var(--sub);
    border: 1px solid transparent;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .chip.active { background: transparent; color: var(--text); border-color: var(--accent, var(--border)); }
  .icon-btn {
    background: var(--chip); border: 1px solid var(--border-soft);
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .icon-btn:hover { background: var(--chip-active); border-color: var(--border); }
  .icon-btn:active { transform: scale(0.92); }

  .panel { background: var(--card); border: 1px solid var(--border-soft); }

  /* --- pie timer: a solid disc that shrinks as time elapses, not a ring --- */
  .timer-wrap { position: relative; width: min(38vh, 26vw, 340px); aspect-ratio: 1/1; }
  .donut {
    width: 100%; height: 100%; border-radius: 50%;
    box-shadow: 0 0 0 1px var(--border-soft) inset, 0 12px 32px rgba(0,0,0,0.10);
    filter: saturate(0.85);
    transition: background 0.2s linear;
  }
  #cycleDisplay { font-size: 0.65rem; letter-spacing: 0.08em; }

  /* time shown as its own standalone element, separate from the donut */
  #timeDisplay {
    font-size: clamp(3.25rem, 6.5vw, 5.75rem);
    font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  #modeLabel { letter-spacing: 0.22em; font-weight: 600; }

  .ctrl-btn { transition: transform 0.15s ease, filter 0.2s ease; }
  .ctrl-btn:active { transform: scale(0.94); }
  @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:.55} }
  .running-pulse { animation: pulse-soft 2s ease-in-out infinite; }

  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  .preset {
    background: var(--chip); border: 1px solid var(--border);
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .preset:hover { background: var(--chip-active); }
  .preset.active { border-color: var(--accent, var(--text)); color: var(--text); background: var(--chip-active); }
  @keyframes fadeIn { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }

  .swatch {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--stage);
    outline: 1px solid transparent;
    cursor: pointer; transition: transform 0.15s ease, outline-color 0.15s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.selected { outline-color: var(--sub); transform: scale(1.1); }

  select, input[type=number], input[type=text] {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  select:focus, input:focus { outline: none; border-color: var(--sub); }

  #taskInput { border: none; border-bottom: 1px solid var(--border); border-radius: 0; background: transparent; font-weight: 400; }
  #taskInput:focus { border-bottom-color: var(--sub); }
  #taskInput::placeholder { color: var(--sub); opacity: 0.7; }

  .section-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; color: var(--sub); text-transform: uppercase; }
  .divider { border-top: 1px solid var(--border-soft); }

  #sidebar { width: min(360px, 100%); }
  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--track); border-radius: 3px; }

  #focusOverlay { position: fixed; inset: 0; background: var(--stage); z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; }
  #focusOverlay.hidden { display: none; }
</style>
</head>
<body class="min-h-screen w-full flex flex-col lg:flex-row" style="background-color: var(--stage);">

  <!-- main stage -->
  <main class="flex-1 flex flex-col relative px-6 py-6 lg:px-14 lg:py-8 min-h-[100vh] lg:min-h-0 lg:h-screen lg:overflow-y-auto">

    <div class="flex items-center justify-between mb-6 lg:mb-6">
      <h1 class="text-sm font-semibold tracking-widest sub">🍅 POMODORO</h1>
      <div class="flex items-center gap-2">
        <button id="focusBtn" class="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-sm" title="집중 모드">⛶</button>
        <button id="themeBtn" class="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-sm" title="테마 전환">🌙</button>
      </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center gap-6 lg:gap-6 py-4">

      <!-- mode switcher -->
      <div id="modeSwitch" class="flex gap-6 text-sm font-medium">
        <button data-mode="work" class="chip active pb-2 border-b-2">집중</button>
        <button data-mode="short" class="chip pb-2 border-b-2">짧은 휴식</button>
        <button data-mode="long" class="chip pb-2 border-b-2">긴 휴식</button>
      </div>

      <!-- pie timer, standalone: a solid disc that shrinks as time elapses -->
      <div class="timer-wrap">
        <div id="donut" class="donut"></div>
      </div>
      <span id="cycleDisplay" class="text-xs sub tracking-wider -mt-4">완료 0</span>

      <!-- time, displayed separately from the pie -->
      <div class="flex flex-col items-center gap-1">
        <span id="modeLabel" class="text-xs sub uppercase">집중 시간</span>
        <span id="timeDisplay">25:00</span>
      </div>

      <!-- task label -->
      <input id="taskInput" type="text" maxlength="60" placeholder="지금 집중할 일은?"
        class="w-full max-w-xs text-center text-sm py-2 px-1 outline-none">

      <!-- controls -->
      <div class="flex items-center justify-center gap-5">
        <button id="resetBtn" class="ctrl-btn icon-btn w-14 h-14 rounded-full flex items-center justify-center text-xl" title="초기화">↺</button>
        <button id="startBtn" class="ctrl-btn w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold text-white shadow-lg" title="시작/일시정지">▶</button>
        <button id="skipBtn" class="ctrl-btn icon-btn w-14 h-14 rounded-full flex items-center justify-center text-xl" title="다음 단계로">⏭</button>
      </div>

    </div>
  </main>

  <!-- settings sidebar -->
  <aside id="sidebar" class="panel lg:h-screen lg:overflow-y-auto px-7 py-9 lg:py-12 space-y-6 border-t lg:border-t-0 lg:border-l">

    <div>
      <h2 class="section-label">설정</h2>
    </div>

    <div class="divider pt-6 space-y-5">
      <div class="section-label">시간 (분)</div>

      <div>
        <div class="text-xs sub mb-2">집중</div>
        <div class="flex flex-wrap items-center gap-2">
          <div class="preset-group flex flex-wrap gap-1.5" data-target="work" data-options="15,25,45,60"></div>
          <input id="workInput" type="number" inputmode="numeric" min="1" max="180" value="25" class="w-14 text-center rounded-md py-1 text-xs">
        </div>
      </div>

      <div>
        <div class="text-xs sub mb-2">짧은 휴식</div>
        <div class="flex flex-wrap items-center gap-2">
          <div class="preset-group flex flex-wrap gap-1.5" data-target="short" data-options="5,10,15"></div>
          <input id="shortInput" type="number" inputmode="numeric" min="1" max="60" value="5" class="w-14 text-center rounded-md py-1 text-xs">
        </div>
      </div>

      <div>
        <div class="text-xs sub mb-2">긴 휴식</div>
        <div class="flex flex-wrap items-center gap-2">
          <div class="preset-group flex flex-wrap gap-1.5" data-target="long" data-options="15,20,30"></div>
          <input id="longInput" type="number" inputmode="numeric" min="1" max="90" value="15" class="w-14 text-center rounded-md py-1 text-xs">
        </div>
      </div>
    </div>

    <div class="divider pt-6 flex items-center justify-between">
      <span class="section-label">긴 휴식 주기</span>
      <div class="flex items-center gap-2">
        <input id="intervalInput" type="number" inputmode="numeric" min="2" max="10" value="4" class="w-12 text-center rounded-md py-1 text-xs">
        <span class="text-xs sub">번째마다</span>
      </div>
    </div>

    <div class="divider pt-6">
      <div class="mb-3 section-label">타이머 색상</div>
      <div id="colorSwatches" class="flex gap-3"></div>
    </div>

    <div class="divider pt-6">
      <div class="mb-3 section-label">알림음</div>
      <div class="flex items-center gap-3">
        <select id="soundSelect" class="rounded-md py-1.5 px-2 text-xs flex-1">
          <option value="classic">클래식 (트리플 톤)</option>
          <option value="chime">차임벨</option>
          <option value="digital">디지털 비프</option>
        </select>
        <button id="previewSoundBtn" class="icon-btn rounded-md px-3 py-1.5 text-xs whitespace-nowrap">▶ 미리듣기</button>
      </div>
      <div class="flex items-center gap-2 mt-3">
        <span class="text-xs sub w-10">볼륨</span>
        <input id="volumeInput" type="range" min="0" max="100" value="70" class="flex-1">
      </div>
    </div>

    <div class="divider pt-6 flex items-center justify-between">
      <span class="text-xs sub">다음 단계 자동 시작</span>
      <input id="autoStartInput" type="checkbox" class="w-4 h-4">
    </div>
    <div class="flex items-center justify-between">
      <span class="text-xs sub">종료 5초 전 카운트다운 비프</span>
      <input id="countdownBeepInput" type="checkbox" class="w-4 h-4" checked>
    </div>

  </aside>

<!-- focus mode overlay: time on the left, pie timer on the right -->
<div id="focusOverlay" class="hidden">
  <button id="focusExitBtn" class="icon-btn rounded-full px-5 py-2 text-sm absolute top-8 right-8">✕ 나가기</button>
  <div class="flex flex-col lg:flex-row items-center justify-center gap-12 lg:gap-24 px-6">
    <div class="flex flex-col items-center gap-3 order-2 lg:order-1">
      <span id="focusModeLabel" class="sub text-sm tracking-[0.22em] font-semibold uppercase"></span>
      <span id="focusTime" class="font-semibold tabular-nums" style="font-size: clamp(3.5rem, 12vw, 8.5rem); letter-spacing: -0.02em;">25:00</span>
      <span id="focusTask" class="sub text-lg mt-1"></span>
    </div>
    <div class="timer-wrap order-1 lg:order-2" style="width: min(40vh, 30vw, 340px);">
      <div id="focusDonut" class="donut"></div>
    </div>
  </div>
</div>

<script>
const ACCENT_COLORS = ['#6794c1', '#d4867d', '#5dac7e', '#d1a861', '#aa8bc1', '#ca8968'];
const DURATION_PRESETS = { work: [15, 25, 45, 60], short: [5, 10, 15], long: [15, 20, 30] };
const SOUND_LABEL = { classic: '클래식 (트리플 톤)', chime: '차임벨', digital: '디지털 비프' };
const DURATIONS = { work: 25, short: 5, long: 15 };
const MODE_LABEL = { work: '집중 시간', short: '짧은 휴식', long: '긴 휴식' };

let longBreakInterval = 4;
let accentColor = ACCENT_COLORS[0];
let soundType = 'classic';
let volume = 0.7;
let theme = 'dark';

let mode = 'work';
let totalSeconds = DURATIONS.work * 60;
let remaining = totalSeconds;
let running = false;
let timerId = null;
let completedPomodoros = 0;

const root = document.documentElement;
const timeDisplay = document.getElementById('timeDisplay');
const modeLabel = document.getElementById('modeLabel');
const cycleDisplay = document.getElementById('cycleDisplay');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const skipBtn = document.getElementById('skipBtn');
const donut = document.getElementById('donut');
const focusDonut = document.getElementById('focusDonut');
const focusModeLabel = document.getElementById('focusModeLabel');
const modeSwitch = document.getElementById('modeSwitch');
const workInput = document.getElementById('workInput');
const shortInput = document.getElementById('shortInput');
const longInput = document.getElementById('longInput');
const intervalInput = document.getElementById('intervalInput');
const autoStartInput = document.getElementById('autoStartInput');
const countdownBeepInput = document.getElementById('countdownBeepInput');
const soundSelect = document.getElementById('soundSelect');
const previewSoundBtn = document.getElementById('previewSoundBtn');
const volumeInput = document.getElementById('volumeInput');
const colorSwatches = document.getElementById('colorSwatches');
const taskInput = document.getElementById('taskInput');
const themeBtn = document.getElementById('themeBtn');
const focusBtn = document.getElementById('focusBtn');
const focusOverlay = document.getElementById('focusOverlay');
const focusTime = document.getElementById('focusTime');
const focusTask = document.getElementById('focusTask');
const focusExitBtn = document.getElementById('focusExitBtn');

function buildSwatches() {
  colorSwatches.innerHTML = '';
  ACCENT_COLORS.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'swatch';
    btn.style.background = color;
    btn.dataset.color = color;
    btn.addEventListener('click', () => {
      accentColor = color;
      applyAccent();
      saveSettings();
    });
    colorSwatches.appendChild(btn);
  });
  applyAccent();
}

function applyAccent() {
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === accentColor));
  startBtn.style.background = accentColor;
  startBtn.style.boxShadow = `0 8px 24px ${accentColor}55`;
  root.style.setProperty('--accent', accentColor);
}

const durationInputs = { work: workInput, short: shortInput, long: longInput };

function buildPresets() {
  document.querySelectorAll('.preset-group').forEach(group => {
    const target = group.dataset.target;
    group.innerHTML = '';
    group.dataset.options.split(',').forEach(v => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'preset px-2.5 py-1 rounded-md text-xs';
      btn.textContent = v;
      btn.dataset.value = v;
      btn.addEventListener('click', () => {
        DURATIONS[target] = parseInt(v, 10);
        durationInputs[target].value = v;
        onDurationChange();
      });
      group.appendChild(btn);
    });
  });
  syncPresetActive();
}

function syncPresetActive() {
  document.querySelectorAll('.preset-group').forEach(group => {
    const target = group.dataset.target;
    group.querySelectorAll('.preset').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.value, 10) === DURATIONS[target]);
    });
  });
}

function onDurationChange() {
  DURATIONS.work = Math.max(1, parseInt(workInput.value, 10) || 25);
  DURATIONS.short = Math.max(1, parseInt(shortInput.value, 10) || 5);
  DURATIONS.long = Math.max(1, parseInt(longInput.value, 10) || 15);
  workInput.value = DURATIONS.work;
  shortInput.value = DURATIONS.short;
  longInput.value = DURATIONS.long;
  syncPresetActive();
  saveSettings();
  if (!running) {
    totalSeconds = DURATIONS[mode] * 60;
    remaining = totalSeconds;
    updateDisplay();
  }
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('pomodoroSettings') || '{}');
    if (saved.work) DURATIONS.work = saved.work;
    if (saved.short) DURATIONS.short = saved.short;
    if (saved.long) DURATIONS.long = saved.long;
    if (saved.interval) longBreakInterval = saved.interval;
    if (saved.accent) accentColor = saved.accent;
    if (saved.sound) soundType = saved.sound;
    if (typeof saved.volume === 'number') volume = saved.volume;
    if (typeof saved.autoStart === 'boolean') autoStartInput.checked = saved.autoStart;
    if (typeof saved.countdownBeep === 'boolean') countdownBeepInput.checked = saved.countdownBeep;
    if (typeof saved.completed === 'number') completedPomodoros = saved.completed;
    if (saved.theme) theme = saved.theme;
    if (typeof saved.task === 'string') taskInput.value = saved.task;
  } catch (e) {}
  workInput.value = DURATIONS.work;
  shortInput.value = DURATIONS.short;
  longInput.value = DURATIONS.long;
  intervalInput.value = longBreakInterval;
  soundSelect.value = soundType;
  volumeInput.value = Math.round(volume * 100);
  cycleDisplay.textContent = `완료 ${completedPomodoros}`;
  focusTask.textContent = taskInput.value;
  applyTheme(theme, false);
}

function saveSettings() {
  localStorage.setItem('pomodoroSettings', JSON.stringify({
    work: DURATIONS.work,
    short: DURATIONS.short,
    long: DURATIONS.long,
    interval: longBreakInterval,
    accent: accentColor,
    sound: soundType,
    volume: volume,
    autoStart: autoStartInput.checked,
    countdownBeep: countdownBeepInput.checked,
    completed: completedPomodoros,
    theme: theme,
    task: taskInput.value
  }));
}

function applyTheme(newTheme, persist = true) {
  theme = newTheme;
  root.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
  if (persist) saveSettings();
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateDisplay() {
  const text = formatTime(remaining);
  timeDisplay.textContent = text;
  focusTime.textContent = text;
  // pie starts full and shrinks as time runs out, rather than a ring that fills up
  const pct = (remaining / totalSeconds) * 100;
  const gradient = `conic-gradient(${accentColor} 0% ${pct}%, var(--track) ${pct}% 100%)`;
  donut.style.background = gradient;
  focusDonut.style.background = gradient;
  document.title = `${text} - ${MODE_LABEL[mode]} | 뽀모도로`;
}

function setMode(newMode, resetTimer = true) {
  mode = newMode;
  modeLabel.textContent = MODE_LABEL[mode];
  focusModeLabel.textContent = MODE_LABEL[mode];
  document.querySelectorAll('#modeSwitch .chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  if (resetTimer) {
    pause();
    totalSeconds = DURATIONS[mode] * 60;
    remaining = totalSeconds;
    updateDisplay();
  }
}

function tick() {
  remaining--;
  updateDisplay();
  if (countdownBeepInput.checked && remaining > 0 && remaining <= 5) {
    playTick();
  }
  if (remaining <= 0) {
    finishSession();
  }
}

function finishSession() {
  pause();
  playAlarm();
  if (mode === 'work') {
    completedPomodoros++;
    cycleDisplay.textContent = `완료 ${completedPomodoros}`;
    saveSettings();
    const next = completedPomodoros % longBreakInterval === 0 ? 'long' : 'short';
    setMode(next);
  } else {
    setMode('work');
  }
  if (autoStartInput.checked) {
    start();
  }
}

function getAudioCtx() {
  if (!window._pomoCtx) {
    window._pomoCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return window._pomoCtx;
}

function beep(freq, start, dur, type = 'sine', peak = 0.3) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = freq;
  osc.type = type;
  const g = peak * volume;
  gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(Math.max(g, 0.0001), ctx.currentTime + start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + dur);
}

function playTick() {
  try {
    beep(1760, 0, 0.35, 'sine', 0.16);
    beep(2637, 0, 0.3, 'sine', 0.07);
  } catch (e) {}
}

function playSound(type) {
  try {
    if (type === 'classic') {
      beep(880, 0, 0.25);
      beep(1046, 0.3, 0.25);
      beep(1318, 0.6, 0.4);
    } else if (type === 'chime') {
      beep(1318, 0, 0.6, 'sine', 0.25);
      beep(1568, 0.15, 0.7, 'sine', 0.2);
      beep(1976, 0.3, 0.9, 'sine', 0.18);
    } else if (type === 'digital') {
      beep(1200, 0, 0.1, 'square', 0.2);
      beep(1200, 0.15, 0.1, 'square', 0.2);
      beep(1200, 0.3, 0.1, 'square', 0.2);
    }
  } catch (e) {}
}

function playAlarm() {
  playSound(soundType);
  if (window.Notification && Notification.permission === 'granted') {
    new Notification(`${MODE_LABEL[mode]} 종료!`, { body: '다음 단계를 시작하세요.' });
  }
}

function start() {
  if (running) return;
  running = true;
  startBtn.textContent = '❚❚';
  startBtn.classList.add('running-pulse');
  timerId = setInterval(tick, 1000);
  if (window.Notification && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function pause() {
  running = false;
  clearInterval(timerId);
  startBtn.textContent = '▶';
  startBtn.classList.remove('running-pulse');
}

function toggleStart() {
  running ? pause() : start();
}

function resetCurrent() {
  pause();
  remaining = totalSeconds;
  updateDisplay();
}

function skipSession() {
  pause();
  if (mode === 'work') {
    const next = (completedPomodoros + 1) % longBreakInterval === 0 ? 'long' : 'short';
    setMode(next);
  } else {
    setMode('work');
  }
}

modeSwitch.addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  setMode(btn.dataset.mode);
});

startBtn.addEventListener('click', toggleStart);
resetBtn.addEventListener('click', resetCurrent);
skipBtn.addEventListener('click', skipSession);

[workInput, shortInput, longInput].forEach(input => {
  input.addEventListener('change', onDurationChange);
});

intervalInput.addEventListener('change', () => {
  longBreakInterval = Math.max(2, parseInt(intervalInput.value) || 4);
  intervalInput.value = longBreakInterval;
  saveSettings();
});

soundSelect.addEventListener('change', () => {
  soundType = soundSelect.value;
  saveSettings();
});

previewSoundBtn.addEventListener('click', () => playSound(soundSelect.value));

volumeInput.addEventListener('input', () => {
  volume = parseInt(volumeInput.value) / 100;
  saveSettings();
});

autoStartInput.addEventListener('change', saveSettings);
countdownBeepInput.addEventListener('change', saveSettings);

taskInput.addEventListener('input', () => {
  focusTask.textContent = taskInput.value;
  saveSettings();
});

themeBtn.addEventListener('click', () => {
  applyTheme(theme === 'dark' ? 'light' : 'dark');
});

focusBtn.addEventListener('click', () => {
  focusTask.textContent = taskInput.value;
  focusOverlay.classList.remove('hidden');
});
focusExitBtn.addEventListener('click', () => {
  focusOverlay.classList.add('hidden');
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    toggleStart();
  }
  if (e.code === 'Escape') {
    focusOverlay.classList.add('hidden');
  }
});

if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
  theme = 'light';
}

buildSwatches();
loadSettings();
buildPresets();
setMode('work');
</script>
</body>
</html>
