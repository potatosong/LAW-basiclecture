<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>영단어장</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="영단어장">

        ::-webkit-scrollbar { width: 6px; }

        .safe-top { padding-top: env(safe-area-inset-top, 0px); }

<body class="bg-slate-100 font-sans text-slate-800 antialiased">

<!-- 동기화 상태 토스트 -->
<div id="syncToast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-full shadow-xl flex items-center gap-2">
    <span id="syncDot" class="w-2 h-2 rounded-full bg-yellow-400"></span>
    <span id="syncMsg">동기화 중...</span>
</div>

<!-- 오프라인 배너 -->
<div id="offlineBanner" class="hidden fixed top-0 left-0 right-0 z-[199] bg-amber-500 text-white text-xs font-bold text-center py-2">
    오프라인 상태 — 변경사항은 연결 시 자동 반영됩니다
</div>

<input type="file" id="importFileInput" accept=".json" onchange="importJsonFile(event)" class="hidden">

<!-- 모바일: 드로어 오버레이 -->
<div id="drawerOverlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden" onclick="closeSidebar()"></div>

<!-- 사이드바 -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-slate-900 text-slate-300 flex flex-col justify-between border-r border-slate-800 select-none z-50 transition-transform duration-300 -translate-x-full lg:translate-x-0 lg:static lg:h-screen lg:shrink-0">
    <div class="safe-top">
        <div class="p-5 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-600/30 text-xl">
                <i class="fa-solid fa-swatchbook"></i>
            </div>
            <div class="flex-1">
                <h1 class="text-base font-bold text-white tracking-wide">영단어장</h1>
                <span class="text-[10px] text-indigo-300 font-mono font-semibold flex items-center gap-1.5">
                    <span id="syncDot2" class="w-1.5 h-1.5 rounded-full bg-yellow-400 inline-block"></span>
                    <span id="syncLabel">연결 중...</span>
                </span>
            </div>
            <button onclick="closeSidebar()" class="lg:hidden text-slate-500 hover:text-white p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>

        <div class="p-4 overflow-y-auto" style="max-height: calc(100dvh - 220px)">

                <button onclick="addRootFolder()" class="text-indigo-400 hover:text-indigo-300 text-[11px] flex items-center gap-1 font-bold">
                    <i class="fa-solid fa-folder-plus"></i> 메인추가

            <ul id="folderTreeArea" class="space-y-1.5"></ul>

    </div>

    <div class="p-4 border-t border-slate-800 space-y-2 safe-bottom">

            <i class="fa-solid fa-plus"></i> 새 메인 폴더 만들기
        </button>
        <div class="grid grid-cols-2 gap-2 pt-1">
            <button onclick="exportJsonFile()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-2.5 rounded-xl font-medium transition border border-slate-700 flex items-center justify-center gap-1.5">

</aside>

<!-- 메인 컨텐츠 -->
<div class="lg:flex lg:h-screen lg:overflow-hidden">

    <main class="flex-1 flex flex-col min-h-screen lg:h-screen lg:overflow-hidden bg-slate-50">

        <!-- 헤더 -->

            <div class="flex items-center gap-2 mb-2 lg:hidden">
                <button onclick="openSidebar()" class="bg-slate-100 text-slate-600 p-2.5 rounded-xl border border-slate-200">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 id="currentFolderNameMobile" class="font-extrabold text-slate-800 text-base flex-1 truncate">기본 단어장</h2>
                <button onclick="toggleFullScreen()" id="fsBtnMobile" class="bg-slate-100 text-slate-600 p-2.5 rounded-xl border border-slate-200">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>

            <!-- 검색 행 -->
            <div class="flex gap-2 max-w-4xl">
                <button onclick="toggleSidebar()" class="hidden lg:flex bg-slate-100 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 border border-slate-200 p-3 rounded-xl transition text-sm items-center justify-center shrink-0">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <button id="fsBtn" onclick="toggleFullScreen()" class="hidden lg:flex bg-slate-100 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 border border-slate-200 p-3 rounded-xl transition text-sm items-center justify-center shrink-0">
                    <i class="fa-solid fa-expand"></i>
                </button>

                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-sm"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="searchInput" placeholder="영단어 입력 후 검색 (뜻 여러개: / 구분)"

                </div>
                <button onclick="speakInputText()" class="hidden sm:flex bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2.5 rounded-xl text-sm font-semibold transition items-center gap-1.5 border border-slate-200 shrink-0">
                    <i class="fa-solid fa-volume-high text-indigo-600"></i>

                <button onclick="searchMeaning()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-md transition shrink-0">
                    <span class="hidden sm:inline">뜻 검색</span>
                    <i class="fa-solid fa-search sm:hidden"></i>

            </div>

            <div id="searchResultArea" class="max-w-4xl"></div>
        </header>

        <!-- 단어 목록 -->
        <div class="flex-1 overflow-y-auto p-4">
            <div class="max-w-6xl mx-auto">
                <!-- 데스크탑 폴더명 + 버튼 행 -->
                <div class="hidden lg:flex flex-wrap justify-between items-center gap-3 mb-5 select-none">
                    <div>
                        <span class="text-xs font-bold text-indigo-600 uppercase tracking-wider bg-indigo-50 px-2.5 py-1 rounded-md">Current Folder</span>

                    </div>
                    <div class="flex flex-wrap items-center gap-2" id="toolbarDesktop"></div>
                </div>

                <!-- 모바일 툴바 (스크롤 가능) -->
                <div class="lg:hidden flex items-center gap-2 mb-4 overflow-x-auto pb-1 select-none" id="toolbarMobile"></div>

                <div id="wordGridArea" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
            </div>
        </div>

        <!-- 모바일 하단 플로팅 버튼 -->
        <div class="lg:hidden fixed bottom-6 right-4 z-30 safe-bottom flex flex-col gap-2 items-end">
            <button onclick="openStudyModal()" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-4 py-3 rounded-2xl text-sm font-extrabold shadow-xl flex items-center gap-2">
                <i class="fa-solid fa-gamepad text-amber-300"></i> 학습 센터
            </button>

    </main>
</div>

<!-- 학습 모달 -->
<div id="studyModal" class="fixed inset-0 bg-slate-950/95 z-50 hidden flex flex-col justify-between p-4 md:p-10 select-none backdrop-blur-md text-white">
    <div class="max-w-4xl mx-auto w-full flex flex-wrap justify-between items-center gap-3 border-b border-slate-800 pb-4">

            <span class="bg-indigo-600 font-mono text-xs px-3 py-1.5 rounded-full font-bold" id="studyProgress">1 / 10</span>
            <button onclick="toggleShuffleMode()" id="studyShuffleBtn" class="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-400 px-3 py-1.5 rounded-xl text-xs font-bold transition flex items-center gap-1.5">
                <i class="fa-solid fa-shuffle"></i> <span>랜덤: OFF</span>

        </div>
        <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 gap-0.5 text-xs font-bold overflow-x-auto">

            <button onclick="setStudyMode('spelling')" id="tab_spelling" class="px-2.5 py-1.5 rounded-lg transition study-tab text-slate-400 hover:text-white whitespace-nowrap">✍️ 철자입력</button>
            <button onclick="setStudyMode('choice')" id="tab_choice" class="px-2.5 py-1.5 rounded-lg transition study-tab text-slate-400 hover:text-white whitespace-nowrap">🔢 객관식</button>

    <div class="flex-1 flex items-center justify-center my-3 max-w-3xl mx-auto w-full text-slate-800">
        <div id="studyCanvas" class="w-full min-h-[320px] sm:min-h-[400px] bg-white border border-slate-200 rounded-3xl shadow-2xl p-6 sm:p-10 flex flex-col justify-center items-center text-center relative overflow-hidden transition-all"></div>
    </div>

    <div class="max-w-3xl mx-auto w-full flex items-center gap-2 safe-bottom">
        <button onclick="studyPrev()" class="bg-slate-800 hover:bg-slate-700 px-4 py-3.5 rounded-2xl font-bold text-sm transition flex items-center gap-1.5 text-white shrink-0"><i class="fa-solid fa-arrow-left"></i> 이전</button>
        <button onclick="toggleStudyMemorized()" id="studyMemBtn" class="flex-1 py-3.5 rounded-2xl font-extrabold text-sm transition border flex items-center justify-center gap-2 shadow-lg"></button>
        <button onclick="studyNext()" class="bg-slate-800 hover:bg-slate-700 px-4 py-3.5 rounded-2xl font-bold text-sm transition flex items-center gap-1.5 text-white shrink-0">다음 <i class="fa-solid fa-arrow-right"></i></button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeplPxURZu9o0OQAFY5RBh1BP0P0dLcSc",
        authDomain: "my-eng-wordbook.firebaseapp.com",
        projectId: "my-eng-wordbook",
        storageBucket: "my-eng-wordbook.firebasestorage.app",
        messagingSenderId: "613424514679",
        appId: "1:613424514679:web:94ecf9cc4898db06876872",
        measurementId: "G-57RT1Y5T0W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DATA_DOC = doc(db, 'wordbook', 'main');

    let isSyncing = false;
    let pendingSave = null;

    function showSyncToast(msg, color) {
        const toast = document.getElementById('syncToast');
        const dot = document.getElementById('syncDot');
        const dot2 = document.getElementById('syncDot2');
        const msgEl = document.getElementById('syncMsg');
        const label = document.getElementById('syncLabel');
        msgEl.textContent = msg;
        dot.style.background = color;
        dot2.style.background = color;
        label.textContent = msg;
        toast.classList.remove('hidden');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    // Firestore에 저장
    window._saveToFirestore = async function(folderTree, words) {
        try {
            showSyncToast('저장 중...', '#facc15');
            await setDoc(DATA_DOC, { folderTree, words, updatedAt: Date.now() });
            showSyncToast('동기화 완료', '#34d399');
        } catch(e) {
            showSyncToast('저장 실패 (오프라인?)', '#f87171');
            console.error(e);
        }
    };

    // 실시간 리스너 — 다른 기기에서 변경 시 자동 반영
    onSnapshot(DATA_DOC, (snap) => {
        if (!snap.exists()) {
            // 문서가 없으면 localStorage 데이터로 초기화
            window._initApp(null);
            return;
        }
        const data = snap.data();
        showSyncToast('동기화됨', '#34d399');
        document.getElementById('syncLabel').textContent = '동기화됨';
        document.getElementById('syncDot2').style.background = '#34d399';
        window._initApp(data);
    }, (err) => {
        console.error(err);
        showSyncToast('연결 오류', '#f87171');
        document.getElementById('syncLabel').textContent = '오프라인';
        document.getElementById('syncDot2').style.background = '#f87171';
        window._initApp(null);
    });
</script>

<script>
    // ── 데이터 초기화 ──────────────────────────────────────
    const LS_TREE = 'smart_folders_tree_v3';
    const LS_WORDS = 'smart_words_pro_v3';

    let folderTree = [];
    let words = [];
    let activeFolderId = '';
    let _appInitialized = false;

    window._initApp = function(fireData) {
        if (fireData) {
            folderTree = fireData.folderTree || [];
            words = (fireData.words || []).map(normalizeWord.bind(null, folderTree));
        } else {
            // Firestore 없으면 localStorage fallback
            let tree = localStorage.getItem(LS_TREE);
            folderTree = tree ? JSON.parse(tree) : [
                { id: 'f_root_0', name: 'Day 1', parentId: null },
                { id: 'f_root_1', name: '회화 표현', parentId: null },
                { id: 'f_root_2', name: '수능 대비', parentId: null }
            ];
            let raw = localStorage.getItem(LS_WORDS);
            words = raw ? JSON.parse(raw).map(normalizeWord.bind(null, folderTree)) : [
                { id: 101, folderId: "f_root_0", word: "serendipity", meanings: ["뜻밖의 기쁨, 행운"], synonyms: ["blessing, windfall"], extraForms: "adj. serendipitous", examples: ["Finding this tool was pure serendipity."], memorized: false },
                { id: 102, folderId: "f_root_0", word: "abhor", meanings: ["혐오하다, 몹시 싫어하다"], synonyms: ["detest, loathe"], extraForms: "n. abhorrence", examples: ["Most people abhor injustice."], memorized: false }
            ];
        }

        // 활성 폴더 복원
        let saved = localStorage.getItem('smart_active_folder_id');
        if (saved && folderTree.some(f => f.id === saved)) {
            activeFolderId = saved;
        } else {
            activeFolderId = folderTree[0]?.id || '';
        }

        if (!_appInitialized) {
            _appInitialized = true;
            renderToolbar();
        }
        renderFolders();
        renderWords();
    };

    function normalizeWord(tree, w) {
        if (typeof w.meaning === 'string') { w.meanings = [w.meaning]; delete w.meaning; }
        if (!w.meanings) w.meanings = ["뜻 없음"];
        if (!w.synonyms || !Array.isArray(w.synonyms)) w.synonyms = w.meanings.map(() => "");
        while (w.synonyms.length < w.meanings.length) w.synonyms.push("");
        if (w.extraForms === undefined) w.extraForms = "";
        if (typeof w.example === 'string') { w.examples = w.example.trim() ? [w.example.trim()] : []; delete w.example; }
        if (!w.examples) w.examples = [];
        if (w.folder && !w.folderId) { let t = tree.find(f => f.name === w.folder); w.folderId = t ? t.id : tree[0]?.id; delete w.folder; }
        if (w.memorized === undefined) w.memorized = false;
        return w;
    }

    function saveData() {
        // localStorage 백업
        localStorage.setItem(LS_TREE, JSON.stringify(folderTree));
        localStorage.setItem(LS_WORDS, JSON.stringify(words));
        localStorage.setItem('smart_active_folder_id', activeFolderId);
        // Firestore 저장
        if (window._saveToFirestore) window._saveToFirestore(folderTree, words);
    }

    // ── 사이드바 ───────────────────────────────────────────
    function openSidebar() {
        document.getElementById('sidebar').classList.remove('-translate-x-full');
        document.getElementById('drawerOverlay').classList.remove('hidden');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('drawerOverlay').classList.add('hidden');
    }
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        if (sb.classList.contains('-translate-x-full')) openSidebar(); else closeSidebar();
    }

    function toggleFullScreen() {
        const btns = [document.getElementById('fsBtn'), document.getElementById('fsBtnMobile')];
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                btns.forEach(b => b && (b.innerHTML = `<i class="fa-solid fa-compress"></i>`));
            }).catch(() => {});
        } else {
            document.exitFullscreen?.().then(() => {
                btns.forEach(b => b && (b.innerHTML = `<i class="fa-solid fa-expand"></i>`));
            });
        }
    }

    // ── 뷰 상태 ────────────────────────────────────────────
    let sortMode = 'newest';
    let isBlurMode = false;
    let isHideMemorized = false;
    let isHideExtra = false;
    let editingWordId = null;
    let currentActiveWord = "";

    function getWordsForCurrentView() {
        let activeObj = folderTree.find(f => f.id === activeFolderId); if (!activeObj) return [];
        let targetIds = [activeFolderId];
        if (activeObj.parentId === null) {
            folderTree.filter(f => f.parentId === activeObj.id).forEach(f => targetIds.push(f.id));
        }
        let list = words.filter(w => targetIds.includes(w.folderId));
        if (sortMode === 'alpha') list.sort((a,b) => a.word.localeCompare(b.word));
        else if (sortMode === 'oldest') list.sort((a,b) => a.id - b.id);
        else list.sort((a,b) => b.id - a.id);
        if (isHideMemorized) list = list.filter(w => !w.memorized);
        return list;
    }

    // ── 툴바 렌더링 ────────────────────────────────────────
    function renderToolbar() {
        const toolbarHtml = `
            <button onclick="openStudyModal()" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-3 py-2 rounded-xl text-xs font-extrabold shadow-md transition flex items-center gap-1.5 whitespace-nowrap">
                <i class="fa-solid fa-gamepad text-amber-300"></i> 학습 센터
            </button>
            <button onclick="toggleHideExtra()" id="hideExtraBtn" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-2.5 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-file-circle-plus text-purple-600"></i> <span>부가정보</span>
            </button>
            <button onclick="toggleHideMemorized()" id="hideMemBtn" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-2.5 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-eye text-emerald-600"></i> <span>암기숨김</span>
            </button>
            <button onclick="toggleBlurMode()" id="blurBtn" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-2.5 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-eye-slash text-slate-400"></i> <span>뜻가리기</span>
            </button>
            <button onclick="toggleSortMode()" id="sortBtn" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-2.5 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-arrow-down-9-1 text-slate-500"></i> <span>최신순</span>
            </button>
            <button id="playAllBtn" onclick="playAllWords()" class="bg-teal-600 hover:bg-teal-700 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-md transition flex items-center gap-1.5 whitespace-nowrap">
                <i class="fa-solid fa-play"></i> 연속발음
            </button>
        `;
        const d = document.getElementById('toolbarDesktop');
        const m = document.getElementById('toolbarMobile');
        if (d) d.innerHTML = toolbarHtml;
        if (m) m.innerHTML = toolbarHtml;
    }

    // ── 폴더 렌더링 ────────────────────────────────────────
    function renderFolders() {
        const area = document.getElementById('folderTreeArea');
        let roots = folderTree.filter(f => f.parentId === null);
        area.innerHTML = roots.map(root => {
            let isRootActive = (root.id === activeFolderId);
            let children = folderTree.filter(f => f.parentId === root.id);
            let childHtml = children.map(child => {
                let isChildActive = (child.id === activeFolderId);
                return `<li class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition ${isChildActive ? 'bg-indigo-600 text-white font-bold' : 'hover:bg-slate-800/80 text-slate-400 hover:text-slate-200'}" onclick="selectFolder('${child.id}', event)">
                    <div class="flex items-center gap-2 truncate"><i class="fa-solid fa-file-lines text-xs ${isChildActive ? 'text-white':'text-slate-500'}"></i><span class="text-xs truncate">${child.name}</span></div>
                    <button onclick="deleteFolder('${child.id}', event)" class="text-slate-500 hover:text-rose-400 px-1 shrink-0"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                </li>`;
            }).join('');
            return `<li class="flex flex-col mb-1.5">
                <div class="flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition ${isRootActive ? 'bg-indigo-600 text-white font-bold shadow-md' : 'hover:bg-slate-800 text-slate-300'}" onclick="selectFolder('${root.id}', event)">
                    <div class="flex items-center gap-2 truncate font-medium"><i class="fa-solid fa-folder${isRootActive ? '-open text-white' : ' text-indigo-400'}"></i><span class="text-xs truncate">${root.name}</span></div>
                    <div class="flex items-center gap-0.5 shrink-0">
                        <button onclick="addSubFolder('${root.id}', event)" class="text-slate-400 hover:text-white p-1"><i class="fa-solid fa-folder-plus text-xs"></i></button>
                        <button onclick="deleteFolder('${root.id}', event)" class="text-slate-500 hover:text-rose-400 p-1"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>
                ${children.length > 0 ? `<ul class="pl-6 mt-1 space-y-1 border-l border-slate-800 ml-3.5">${childHtml}</ul>` : ''}
            </li>`;
        }).join('');
        updateCurrentFolderTitle();
    }

    function updateCurrentFolderTitle() {
        let current = folderTree.find(f => f.id === activeFolderId); if (!current) return;
        let display = current.name;
        if (current.parentId) { let parent = folderTree.find(f => f.id === current.parentId); if (parent) display = `${parent.name} > ${current.name}`; }
        const el1 = document.getElementById('currentFolderName');
        const el2 = document.getElementById('currentFolderNameMobile');
        if (el1) el1.innerText = display;
        if (el2) el2.innerText = display;
    }

    function selectFolder(id, e) { e.stopPropagation(); stopAllWords(); activeFolderId = id; localStorage.setItem('smart_active_folder_id', id); renderFolders(); renderWords(); closeSidebar(); }
    function addRootFolder() { const name = prompt("새 메인 폴더명:"); if (!name?.trim()) return; let newId = 'f_' + Date.now(); folderTree.push({ id: newId, name: name.trim(), parentId: null }); activeFolderId = newId; saveData(); renderFolders(); renderWords(); }
    function addSubFolder(parentId, e) { e.stopPropagation(); let pNode = folderTree.find(f => f.id === parentId); const name = prompt(`[ ${pNode.name} ] 하위 폴더명:`); if (!name?.trim()) return; let newId = 'f_' + Date.now(); folderTree.push({ id: newId, name: name.trim(), parentId: parentId }); activeFolderId = newId; saveData(); renderFolders(); renderWords(); }
    function deleteFolder(id, e) { e.stopPropagation(); let total = [id, ...folderTree.filter(f => f.parentId === id).map(f => f.id)]; if (confirm("폴더와 내부 데이터를 삭제합니다.")) { folderTree = folderTree.filter(f => !total.includes(f.id)); words = words.filter(w => !total.includes(w.folderId)); if (total.includes(activeFolderId)) activeFolderId = folderTree[0]?.id || ''; saveData(); renderFolders(); renderWords(); } }

    // ── 검색 & 편집 ────────────────────────────────────────
    async function searchMeaning() {
        const txt = document.getElementById('searchInput')?.value.trim(); if (!txt) { alert("입력하세요."); return; }
        const resArea = document.getElementById('searchResultArea');
        resArea.innerHTML = `<div class="mt-3 text-center py-4 text-slate-400 text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i>검색 중...</div>`;
        if (txt.includes(' ') && !txt.includes('/')) { buildEditorCard(txt, '', '', true); return; }
        let parts = txt.split('/').map(s => s.trim()).filter(Boolean);
        let wordPart = parts[0]; let customMeanings = parts.slice(1);
        let phonetic = '', exEng = '', fetchedSynonyms = '';
        try {
            const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(wordPart)}`);
            if (dRes.ok) { const data = await dRes.json(); phonetic = data[0]?.phonetic || data[0]?.phonetics?.find(p=>p.text)?.text || ''; exEng = data[0]?.meanings[0]?.definitions[0]?.example || ''; try { fetchedSynonyms = (data[0]?.meanings[0]?.synonyms || []).slice(0,4).join(', '); } catch(e) {} }
        } catch(e) {}
        let koMean = '';
        if (customMeanings.length === 0) {
            try { const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(wordPart)}`); koMean = (await tRes.json())[0][0][0] || ''; } catch(e) {}
        }
        buildEditorCard(wordPart, phonetic, koMean, false, exEng, customMeanings, fetchedSynonyms);
    }

    function buildEditorCard(wordTxt, phonetic, koMean, isSentence, fetchedEx='', injectedMeanings=[], fetchedSyns='', isEditMode=false) {
        currentActiveWord = wordTxt;
        const defaultEx = isSentence ? wordTxt : fetchedEx;
        let meanInputsHtml = '';
        if (injectedMeanings.length > 0) {
            meanInputsHtml = injectedMeanings.map((m,i) => `<div class="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in"><div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">${i+1}</span><input type="text" value="${m}" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold text-slate-900 outline-none"><button onclick="this.parentElement.parentElement.remove(); reindexMeanings();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" placeholder="유의어 (쉼표 구분)" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div></div>`).join('');
        } else {
            meanInputsHtml = `<div class="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in"><div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">1</span><input type="text" value="${koMean}" placeholder="첫 번째 뜻 입력" onkeydown="if(event.key==='Enter') saveActiveWord()" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold text-slate-900 outline-none"></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" value="${fetchedSyns}" placeholder="유의어 (쉼표 구분)" onkeydown="if(event.key==='Enter') saveActiveWord()" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div></div>`;
        }
        let titleBar = isEditMode
            ? `<span class="text-amber-800 font-black flex items-center gap-1.5 text-sm"><i class="fa-solid fa-pen-to-square text-amber-600"></i> [ ${wordTxt} ] 수정 중...</span>`
            : `<div class="flex items-baseline gap-2 overflow-hidden"><span class="text-xl font-black text-slate-900 truncate">${wordTxt}</span><span class="text-indigo-600 font-mono text-sm">${phonetic}</span></div>`;
        let saveBtnEl = isEditMode
            ? `<button onclick="saveActiveWord()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2.5 rounded-xl text-sm font-black shadow-md transition flex items-center gap-1.5"><i class="fa-solid fa-check"></i> 수정 완료</button>`
            : `<button onclick="saveActiveWord()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-black shadow-md transition">⭐ 단어 저장</button>`;

        document.getElementById('searchResultArea').innerHTML = `
            <div class="${isEditMode ? 'bg-amber-50/95 border-2 border-amber-400/80':'bg-indigo-50/95 border border-indigo-200'} rounded-2xl p-4 mt-3 shadow-md text-slate-800 animate-fade-in">
                <div class="flex justify-between items-center mb-3 pb-2 border-b ${isEditMode ? 'border-amber-200/80':'border-indigo-100'}">${titleBar}<button onclick="doSpeak('${wordTxt.replace(/'/g, "\\'")}')" class="bg-white hover:bg-indigo-100 text-indigo-600 p-2 rounded-xl shadow-sm transition ml-2 shrink-0"><i class="fa-solid fa-volume-high"></i></button></div>
                <div class="mb-3"><div class="flex justify-between items-center mb-2"><label class="text-xs font-bold text-slate-900">1. 뜻 & 유의어</label><button onclick="addMeaningInput()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-2.5 py-1 rounded-lg font-bold shadow transition flex items-center gap-1"><i class="fa-solid fa-plus text-[10px]"></i> 뜻 추가</button></div><div id="meanGroup" class="space-y-2">${meanInputsHtml}</div></div>
                <div class="mb-3 bg-white p-3 rounded-xl border ${isEditMode ? 'border-amber-200':'border-indigo-100'}"><label class="text-xs font-bold text-slate-800 block mb-1">🔗 파생형 / 문법</label><input type="text" id="extraFormsInp" placeholder="예: n. serendipity / adv. serendipitously" class="w-full px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-slate-50 text-slate-900 focus:bg-white focus:border-indigo-500 outline-none font-medium"></div>
                <div class="mb-3 bg-white/80 p-3 rounded-xl border ${isEditMode ? 'border-amber-200':'border-indigo-100'}"><div class="flex justify-between items-center mb-2"><label class="text-xs font-bold text-slate-700 flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="useExCheck" checked onclick="toggleExampleInputs()" class="accent-indigo-600 w-4 h-4"><span>✍️ 예문 저장</span></label><button onclick="addExampleInput()" id="addExBtn" class="bg-white border border-slate-300 text-slate-700 text-xs px-2.5 py-1 rounded-lg font-bold transition flex items-center gap-1"><i class="fa-solid fa-plus text-[10px]"></i> 예문 추가</button></div><div id="exGroup" class="space-y-1.5"><div class="flex items-center gap-2 ex-item"><span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">1</span><input type="text" value="${defaultEx}" placeholder="첫 번째 예문" onkeydown="if(event.key==='Enter') saveActiveWord()" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white text-slate-800 outline-none"></div></div></div>
                <div class="flex justify-end gap-2"><button onclick="document.getElementById('searchResultArea').innerHTML=''; editingWordId=null;" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold transition">닫기</button>${saveBtnEl}</div>
            </div>
        `;
        setTimeout(() => document.querySelector('.mean-inp')?.focus(), 50);
    }

    function addMeaningInput() { const w = document.getElementById('meanGroup'); const c = w.children.length + 1; const d = document.createElement('div'); d.className = "mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in"; d.innerHTML = `<div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">${c}</span><input type="text" placeholder="${c}번째 뜻 입력" onkeydown="if(event.key==='Enter') saveActiveWord()" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold text-slate-900 outline-none focus:border-indigo-600"><button onclick="this.parentElement.parentElement.remove(); reindexMeanings();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" placeholder="유의어" onkeydown="if(event.key==='Enter') saveActiveWord()" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div>`; w.appendChild(d); d.querySelector('.mean-inp').focus(); }
    function addExampleInput() { const w = document.getElementById('exGroup'); const c = w.children.length + 1; const d = document.createElement('div'); d.className = "flex items-center gap-2 ex-item"; d.innerHTML = `<span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">${c}</span><input type="text" placeholder="${c}번째 예문" onkeydown="if(event.key==='Enter') saveActiveWord()" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white text-slate-800 outline-none"><button onclick="this.parentElement.remove(); reindexExamples();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button>`; w.appendChild(d); d.querySelector('input').focus(); }
    function reindexMeanings() { document.querySelectorAll('#meanGroup .mean-item').forEach((el,idx) => { el.querySelector('.num-badge').innerText = idx+1; el.querySelector('.mean-inp').placeholder = `${idx+1}번째 뜻 입력`; }); }
    function reindexExamples() { document.querySelectorAll('#exGroup .ex-item').forEach((el,idx) => { el.querySelector('.ex-badge').innerText = idx+1; el.querySelector('input').placeholder = `${idx+1}번째 예문`; }); }
    function toggleExampleInputs() { const on = document.getElementById('useExCheck').checked; document.getElementById('exGroup').style.display = on ? 'block' : 'none'; document.getElementById('addExBtn').style.display = on ? 'inline-flex' : 'none'; }

    function openWordEditor(id) {
        let item = words.find(w => w.id === id); if (!item) return; editingWordId = item.id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        buildEditorCard(item.word, '', '', false, '', item.meanings, '', true);
        setTimeout(() => {
            document.querySelectorAll('#meanGroup .mean-item').forEach((row, idx) => { let sInp = row.querySelector('.syn-inp'); if (sInp && item.synonyms[idx]) sInp.value = item.synonyms[idx]; });
            let extInp = document.getElementById('extraFormsInp'); if (extInp) extInp.value = item.extraForms || '';
            const exWrap = document.getElementById('exGroup');
            if (exWrap) exWrap.innerHTML = item.examples.map((ex,idx) => `<div class="flex items-center gap-2 ex-item"><span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">${idx+1}</span><input type="text" value="${ex.replace(/"/g,'&quot;')}" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white text-slate-800 outline-none"><button onclick="this.parentElement.remove(); reindexExamples();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div>`).join('');
        }, 50);
    }

    function saveActiveWord() {
        let mArr = [], sArr = [];
        document.querySelectorAll('#meanGroup .mean-item').forEach(item => { let mVal = item.querySelector('.mean-inp').value.trim(); let sVal = item.querySelector('.syn-inp').value.trim(); if (mVal) { mArr.push(mVal); sArr.push(sVal); } });
        if (mArr.length === 0) { alert("뜻을 1개 이상 입력하세요."); return; }
        let eArr = [];
        if (document.getElementById('useExCheck')?.checked) document.querySelectorAll('#exGroup .ex-inp').forEach(i => { if (i.value.trim()) eArr.push(i.value.trim()); });
        let extraVal = document.getElementById('extraFormsInp')?.value.trim() || '';
        if (editingWordId) {
            let target = words.find(w => w.id === editingWordId);
            if (target) { target.meanings = mArr; target.synonyms = sArr; target.examples = eArr; target.extraForms = extraVal; }
        } else {
            words.unshift({ id: Date.now(), folderId: activeFolderId, word: currentActiveWord, meanings: mArr, synonyms: sArr, extraForms: extraVal, examples: eArr, memorized: false });
        }
        editingWordId = null; saveData(); renderWords();
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResultArea').innerHTML = '';
    }

    // ── 단어 카드 렌더링 ───────────────────────────────────
    function renderWords() {
        const grid = document.getElementById('wordGridArea'); if (!grid) return;
        let list = getWordsForCurrentView();
        let activeObj = folderTree.find(f => f.id === activeFolderId);
        let isRootView = activeObj && activeObj.parentId === null;
        if (list.length === 0) {
            let msg = isHideMemorized ? "모든 단어를 암기하셨습니다! 🎉" : "단어가 없습니다. 위에서 검색하여 추가하세요!";
            grid.innerHTML = `<div class="col-span-full py-16 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200 font-medium">${msg}</div>`;
            return;
        }
        const blurCss = isBlurMode ? 'filter blur-sm hover:blur-none transition duration-300 select-none bg-indigo-100/60 rounded px-1' : '';
        grid.innerHTML = list.map(w => {
            let realFolder = folderTree.find(f => f.id === w.folderId);
            let originBdg = (isRootView && realFolder && realFolder.id !== activeFolderId) ? realFolder.name : '';
            return `
                <div class="bg-white border ${w.memorized ? 'border-emerald-300 bg-emerald-50/25':'border-slate-200 hover:border-indigo-300'} rounded-2xl p-4 shadow-sm hover:shadow-md transition flex flex-col justify-between group">
                    <div>
                        <div class="flex items-start justify-between gap-2 mb-3">
                            <div class="flex items-center gap-1.5 min-w-0 flex-1">
                                <span class="font-extrabold text-lg text-slate-900 break-words select-text">${w.word}</span>
                                <button onclick="doSpeak('${w.word.replace(/'/g, "\\'")}')" class="text-slate-400 hover:text-indigo-600 p-1 shrink-0 transition"><i class="fa-solid fa-volume-high text-sm"></i></button>
                            </div>
                            <button onclick="toggleCardMemorized(${w.id})" class="shrink-0 text-[11px] px-2 py-1 rounded-full font-extrabold transition flex items-center gap-1 shadow-sm ${w.memorized ? 'bg-emerald-600 text-white hover:bg-emerald-700':'bg-slate-100 text-slate-400 hover:bg-slate-200 hover:text-slate-600'}">
                                <i class="fa-solid ${w.memorized ? 'fa-check':'fa-brain'}"></i><span>${w.memorized ? '암기완료':'미암기'}</span>
                            </button>
                        </div>
                        <div onclick="openWordEditor(${w.id})" class="w-full bg-slate-50 hover:bg-indigo-50/50 p-3 rounded-xl cursor-pointer border border-transparent hover:border-indigo-100 transition space-y-1.5 group/edit text-left">
                            ${w.meanings.map((m,idx) => { let syn = w.synonyms[idx]; let synHtml = (!isHideExtra && syn) ? `<div class="text-[11px] font-bold text-purple-700 pl-6 mt-0.5"><span class="bg-purple-100/80 px-1.5 py-0.5 rounded text-[9px] font-mono mr-1">유의어</span>${syn}</div>` : ''; return `<div class="leading-snug"><div class="flex items-start gap-1.5 text-xs font-bold text-slate-900"><span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[9px] font-mono shrink-0 mt-0.5">${idx+1}</span><span class="${blurCss} break-all flex-1">${m}</span></div>${synHtml}</div>`; }).join('')}
                            ${(!isHideExtra && w.extraForms) ? `<div class="pt-1.5 border-t border-slate-200/60 text-[11px] text-slate-600 font-medium"><span class="bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded text-[9px] font-mono mr-1">파생</span>${w.extraForms}</div>` : ''}
                            <div class="text-[10px] text-slate-400 group-hover/edit:text-indigo-600 text-right opacity-0 group-hover/edit:opacity-100 transition"><i class="fa-solid fa-pen"></i> 편집</div>
                        </div>
                        ${w.examples.length > 0 ? `<div class="mt-2.5 pt-2.5 border-t border-slate-100 space-y-1.5"><span class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider block">Examples</span>${w.examples.map((ex,idx) => `<div class="flex items-start justify-between gap-1 bg-slate-50/80 p-2 rounded-xl group/ex border border-transparent hover:border-indigo-100"><div class="flex items-start gap-1.5 flex-1"><span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono mt-0.5">${idx+1}</span><span class="text-xs text-slate-600 italic leading-relaxed select-text break-all flex-1">${ex}</span></div><button onclick="doSpeak('${ex.replace(/'/g,"\\'")}')" class="text-slate-400 hover:text-indigo-600 p-1 opacity-0 group-hover/ex:opacity-100 shrink-0"><i class="fa-solid fa-volume-high text-xs"></i></button></div>`).join('')}</div>` : ''}
                    </div>
                    <div class="mt-3 pt-2.5 border-t border-slate-100 flex items-center justify-between">
                        <div class="text-[10px] font-extrabold text-indigo-500">${originBdg ? `<span class="bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">📁 ${originBdg}</span>` : ''}</div>
                        <button onclick="deleteWord(${w.id})" class="text-slate-300 hover:text-rose-500 text-xs transition flex items-center gap-1 font-medium ml-auto"><i class="fa-solid fa-trash-can"></i> 삭제</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function deleteWord(id) { words = words.filter(w => w.id !== id); saveData(); renderWords(); }
    function toggleCardMemorized(id) { let item = words.find(w => w.id === id); if (!item) return; item.memorized = !item.memorized; saveData(); renderWords(); }

    function toggleHideExtra() { isHideExtra = !isHideExtra; document.querySelectorAll('#hideExtraBtn').forEach(b => { b.innerHTML = isHideExtra ? `<i class="fa-solid fa-file-circle-minus text-purple-600"></i> <span class="text-purple-600 font-extrabold">부가정보</span>` : `<i class="fa-solid fa-file-circle-plus text-purple-600"></i> <span>부가정보</span>`; b.classList.toggle('bg-purple-50', isHideExtra); b.classList.toggle('border-purple-200', isHideExtra); }); renderWords(); }
    function toggleHideMemorized() { isHideMemorized = !isHideMemorized; document.querySelectorAll('#hideMemBtn').forEach(b => { b.innerHTML = isHideMemorized ? `<i class="fa-solid fa-eye-slash text-rose-600"></i> <span class="text-rose-600 font-extrabold">암기숨김</span>` : `<i class="fa-solid fa-eye text-emerald-600"></i> <span>암기숨김</span>`; b.classList.toggle('bg-rose-50', isHideMemorized); b.classList.toggle('border-rose-300', isHideMemorized); }); renderWords(); }
    function toggleBlurMode() { isBlurMode = !isBlurMode; document.querySelectorAll('#blurBtn').forEach(b => { b.innerHTML = isBlurMode ? `<i class="fa-solid fa-eye text-indigo-600"></i> <span class="text-indigo-600 font-bold">뜻가리기</span>` : `<i class="fa-solid fa-eye-slash text-slate-400"></i> <span>뜻가리기</span>`; b.classList.toggle('border-indigo-300', isBlurMode); b.classList.toggle('bg-indigo-50', isBlurMode); }); renderWords(); }
    function toggleSortMode() {
        if (sortMode === 'newest') { sortMode = 'oldest'; document.querySelectorAll('#sortBtn').forEach(b => b.innerHTML = `<i class="fa-solid fa-arrow-up-1-9 text-indigo-600"></i> <span class="text-indigo-600 font-extrabold">오래된순</span>`); }
        else if (sortMode === 'oldest') { sortMode = 'alpha'; document.querySelectorAll('#sortBtn').forEach(b => b.innerHTML = `<i class="fa-solid fa-arrow-down-z-a text-purple-600"></i> <span class="text-purple-600 font-extrabold">A-Z순</span>`); }
        else { sortMode = 'newest'; document.querySelectorAll('#sortBtn').forEach(b => b.innerHTML = `<i class="fa-solid fa-arrow-down-9-1 text-slate-500"></i> <span>최신순</span>`); }
        renderWords();
    }

    // ── 학습 모달 ──────────────────────────────────────────
    let studyList = [], studyIndex = 0, studyMode = 'flashcard', fcFlipped = false, isShuffleOn = false, studyNextTimer = null;

    function openStudyModal() { studyList = getWordsForCurrentView(); if (studyList.length === 0) { alert("학습할 단어가 없습니다."); return; } studyIndex = 0; fcFlipped = false; if (isShuffleOn) shuffleStudyList(); document.getElementById('studyModal').classList.remove('hidden'); setStudyMode('flashcard'); window.addEventListener('keydown', handleStudyKeys); }
    function toggleShuffleMode() { isShuffleOn = !isShuffleOn; const btn = document.getElementById('studyShuffleBtn'); clearTimeout(studyNextTimer); if (isShuffleOn) { btn.innerHTML = `<i class="fa-solid fa-shuffle text-amber-400"></i> <span class="text-amber-400 font-extrabold">랜덤: ON</span>`; btn.className = "bg-indigo-950 border border-indigo-700 text-white px-3 py-1.5 rounded-xl text-xs font-bold transition flex items-center gap-1.5"; shuffleStudyList(); } else { btn.innerHTML = `<i class="fa-solid fa-shuffle"></i> <span>랜덤: OFF</span>`; btn.className = "bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-400 px-3 py-1.5 rounded-xl text-xs font-bold transition flex items-center gap-1.5"; studyList = getWordsForCurrentView(); } studyIndex = 0; fcFlipped = false; renderStudyCanvas(); }
    function shuffleStudyList() { for (let i = studyList.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [studyList[i], studyList[j]] = [studyList[j], studyList[i]]; } }
    function closeStudyModal() { clearTimeout(studyNextTimer); document.getElementById('studyModal').classList.add('hidden'); window.removeEventListener('keydown', handleStudyKeys); renderWords(); }
    function handleStudyKeys(e) { if (e.key === 'Escape') { closeStudyModal(); return; } if (studyMode === 'flashcard' && (e.key === ' ' || e.key === 'Spacebar')) { e.preventDefault(); fcFlipped = !fcFlipped; renderStudyCanvas(); } else if (e.key === 'ArrowLeft' && document.activeElement?.tagName !== 'INPUT') studyPrev(); else if (e.key === 'ArrowRight' && document.activeElement?.tagName !== 'INPUT') studyNext(); }
    function setStudyMode(mode) { clearTimeout(studyNextTimer); studyMode = mode; fcFlipped = false; document.querySelectorAll('.study-tab').forEach(b => b.className = "px-2.5 py-1.5 rounded-lg transition study-tab text-slate-400 hover:text-white whitespace-nowrap"); document.getElementById('tab_' + mode).className = "px-2.5 py-1.5 rounded-lg transition study-tab bg-indigo-600 text-white font-extrabold whitespace-nowrap"; renderStudyCanvas(); }
    function studyPrev() { clearTimeout(studyNextTimer); if (studyIndex > 0) { studyIndex--; fcFlipped = false; renderStudyCanvas(); } else alert("첫 단어입니다."); }
    function studyNext() { clearTimeout(studyNextTimer); if (studyIndex < studyList.length - 1) { studyIndex++; fcFlipped = false; renderStudyCanvas(); } else alert("마지막 단어입니다."); }

    function renderStudyMemBtn() { let item = studyList[studyIndex]; const b = document.getElementById('studyMemBtn'); if (!item || !b) return; if (item.memorized) { b.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400 text-lg"></i> <span>암기 완료</span>`; b.className = "flex-1 py-3.5 rounded-2xl font-extrabold text-sm transition border flex items-center justify-center gap-2 shadow-lg bg-emerald-950/80 border-emerald-500 text-emerald-200"; } else { b.innerHTML = `<i class="fa-solid fa-brain text-amber-400 text-lg"></i> <span>암기 완료로 체크</span>`; b.className = "flex-1 py-3.5 rounded-2xl font-extrabold text-sm transition border flex items-center justify-center gap-2 shadow-lg bg-slate-800 hover:bg-slate-700 border-slate-700 text-slate-200"; } }
    function toggleStudyMemorized() { let item = studyList[studyIndex]; if (!item) return; item.memorized = !item.memorized; let target = words.find(w => w.id === item.id); if (target) target.memorized = item.memorized; saveData(); renderStudyMemBtn(); }

    function renderStudyCanvas() {
        let item = studyList[studyIndex]; if (!item) return;
        document.getElementById('studyProgress').innerText = `${studyIndex + 1} / ${studyList.length}`;
        renderStudyMemBtn();
        const canvas = document.getElementById('studyCanvas');
        let fObj = folderTree.find(f => f.id === item.folderId);
        let isRootView = folderTree.find(f => f.id === activeFolderId)?.parentId === null;
        let subTag = (isRootView && fObj && fObj.id !== activeFolderId) ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded text-[10px] font-mono ml-2 border border-indigo-200">📁 ${fObj.name}</span>` : '';

        if (studyMode === 'flashcard') {
            if (!fcFlipped) { canvas.innerHTML = `<div class="absolute top-4 right-4"><button onclick="event.stopPropagation(); doSpeak('${item.word.replace(/'/g,"\\'")}')" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 flex items-center justify-center text-lg transition"><i class="fa-solid fa-volume-high"></i></button></div><span class="text-xs font-extrabold text-indigo-600 uppercase tracking-widest mb-3 block">Word ${subTag}</span><h3 onclick="fcFlipped=!fcFlipped; renderStudyCanvas();" class="text-4xl sm:text-6xl font-black text-slate-900 cursor-pointer select-text py-4 px-2 break-all">${item.word}</h3><div class="absolute bottom-4 text-xs text-slate-400 font-medium animate-pulse">탭하면 뜻 공개</div>`; }
            else { let mHtml = item.meanings.map((m,i) => { let s = item.synonyms[i] ? `<span class="text-xs font-bold text-purple-600 ml-2">≒ ${item.synonyms[i]}</span>` : ''; return `<div class="flex items-start gap-2 text-left font-bold text-lg sm:text-2xl text-slate-900"><span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-lg text-sm mt-0.5 font-mono shrink-0">${i+1}</span><div class="flex-1"><span class="select-text">${m}</span> ${s}</div></div>`; }).join(''); canvas.innerHTML = `<div class="absolute top-4 right-4"><button onclick="event.stopPropagation(); doSpeak('${item.word.replace(/'/g,"\\'")}')" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 flex items-center justify-center text-lg transition"><i class="fa-solid fa-volume-high"></i></button></div><span class="text-xs font-extrabold text-emerald-600 uppercase tracking-widest mb-3 block">Meanings</span><div onclick="fcFlipped=!fcFlipped; renderStudyCanvas();" class="space-y-3 w-full max-w-lg mx-auto overflow-y-auto max-h-52 cursor-pointer pr-2">${mHtml}</div>${item.examples[0] ? `<div class="mt-4 pt-4 border-t border-slate-100 w-full max-w-lg text-left"><span class="text-[10px] font-extrabold tracking-wider text-slate-400 uppercase block mb-1">Example</span><p class="text-sm text-slate-600 italic select-text">"${item.examples[0]}"</p></div>`:''}<div class="absolute bottom-4 text-xs text-slate-400">다시 탭하면 앞면 복귀</div>`; }
        } else if (studyMode === 'spelling') {
            let hint = item.meanings.join(', '); canvas.innerHTML = `<span class="text-xs font-extrabold text-amber-600 uppercase tracking-widest mb-2 block">✍️ 다음 뜻의 영어 단어를 입력하세요</span><div class="text-lg sm:text-2xl font-black text-slate-900 mb-6 bg-slate-100 px-6 py-4 rounded-2xl border border-slate-200 max-w-lg w-full break-all">${hint}</div><div class="flex gap-2 max-w-sm w-full"><input type="text" id="spellInp" placeholder="철자 입력" onkeydown="if(event.key==='Enter') checkSpell()" class="flex-1 bg-white border border-slate-300 rounded-2xl px-4 py-3 text-center text-xl font-bold text-slate-900 focus:outline-none focus:border-indigo-600 tracking-wider" autocomplete="off"><button onclick="checkSpell()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-3 rounded-2xl text-sm transition">확인</button></div><div id="spellFb" class="mt-4 min-h-[28px] text-sm font-extrabold"></div>`; setTimeout(() => document.getElementById('spellInp')?.focus(), 50);
        } else if (studyMode === 'choice') {
            if (!item._choices || isShuffleOn) item._choices = generateChoices(item); let btns = item._choices.map((ch,idx) => `<button onclick="selectChoice(${idx}, this)" class="choice-btn w-full bg-slate-50 hover:bg-indigo-50/60 border border-slate-200 p-3.5 rounded-2xl text-sm font-bold text-slate-700 hover:text-indigo-950 transition text-left flex items-center justify-between group/cb"><span><span class="text-xs bg-white group-hover/cb:bg-indigo-600 text-slate-500 group-hover/cb:text-white border border-slate-200 px-2 py-0.5 rounded-lg mr-2 font-mono transition">${idx+1}</span> ${ch.text}</span><span class="res-icon hidden ml-2"></span></button>`).join(''); canvas.innerHTML = `<div class="absolute top-4 right-4"><button onclick="doSpeak('${item.word.replace(/'/g,"\\'")}')" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 flex items-center justify-center text-lg transition"><i class="fa-solid fa-volume-high"></i></button></div><span class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2 block">Word</span><h3 class="text-4xl sm:text-5xl font-black text-slate-900 select-text mb-6 break-all">${item.word}</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5 w-full max-w-xl">${btns}</div>`;
        } else if (studyMode === 'blank') {
            let ex = item.examples[0]; if (!ex) { canvas.innerHTML = `<div class="text-slate-500 max-w-md"><i class="fa-solid fa-circle-exclamation text-4xl text-amber-500 mb-3 block"></i><p class="text-base font-bold text-slate-800 mb-1">등록된 예문이 없습니다.</p><span class="text-xs text-slate-400 block">단어 편집에서 예문을 추가해주세요.</span></div>`; return; }
            let reg = new RegExp(escapeRegExp(item.word), 'gi'); let masked = ex.replace(reg, `<span class="mx-1 text-amber-600 font-mono underline font-bold">[ ________ ]</span>`);
            if (masked === ex) { let sReg = new RegExp('\\b' + escapeRegExp(item.word.slice(0,4)) + '\\w*', 'gi'); masked = ex.replace(sReg, `<span class="mx-1 text-amber-600 font-mono underline font-bold">[ ________ ]</span>`); }
            canvas.innerHTML = `<span class="text-xs font-extrabold text-teal-600 uppercase tracking-widest mb-2 block">🕳️ 빈칸을 맞혀보세요</span><div class="text-base sm:text-lg font-medium text-slate-800 mb-3 max-w-lg leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-200">"${masked}"</div><div class="text-xs font-bold text-indigo-900 mb-5 bg-indigo-50 border border-indigo-200 px-3 py-2 rounded-xl">💡 힌트: ${item.meanings.join(', ')}</div><div class="flex gap-2 max-w-sm w-full"><input type="text" id="blankInp" placeholder="정답 입력" onkeydown="if(event.key==='Enter') checkBlank()" class="flex-1 bg-white border border-slate-300 rounded-2xl px-4 py-3 text-center text-lg font-bold focus:outline-none focus:border-teal-600" autocomplete="off"><button onclick="checkBlank()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold px-5 py-3 rounded-2xl text-sm transition">확인</button></div><div id="blankFb" class="mt-4 min-h-[28px] text-sm font-extrabold"></div>`; setTimeout(() => document.getElementById('blankInp')?.focus(), 50);
        }
    }

    function checkSpell() { clearTimeout(studyNextTimer); let uVal = document.getElementById('spellInp')?.value.trim().toLowerCase(); let rVal = studyList[studyIndex].word.toLowerCase(); let fb = document.getElementById('spellFb'); if (!fb) return; if (uVal === rVal) { fb.innerHTML = `<span class="text-emerald-600 font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 정답! 잠시 후 이동...</span>`; doSpeak(rVal); studyNextTimer = setTimeout(() => { if (!document.getElementById('studyModal').classList.contains('hidden')) studyNext(); }, 1300); } else { fb.innerHTML = `<span class="text-rose-600">땡! 정답: <strong class="underline font-mono text-slate-900">${studyList[studyIndex].word}</strong></span>`; } }
    function checkBlank() { clearTimeout(studyNextTimer); let uVal = document.getElementById('blankInp')?.value.trim().toLowerCase(); let rVal = studyList[studyIndex].word.toLowerCase(); let fb = document.getElementById('blankFb'); if (!fb) return; if (uVal === rVal) { fb.innerHTML = `<span class="text-emerald-600 font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 정답! 잠시 후 이동...</span>`; doSpeak(studyList[studyIndex].examples[0]); studyNextTimer = setTimeout(() => { if (!document.getElementById('studyModal').classList.contains('hidden')) studyNext(); }, 1600); } else { fb.innerHTML = `<span class="text-rose-600">오답. 정답: <strong class="underline font-mono text-slate-900">${studyList[studyIndex].word}</strong></span>`; } }

    function generateChoices(target) { let correct = target.meanings[0] || "뜻 정의 없음"; let pool = words.filter(w => w.id !== target.id).map(w => w.meanings[0]).filter(Boolean); const fb = ["매우 아름다운", "개발을 진행하다", "갑작스러운 사고", "전통적인 문화", "위험을 감수하다"]; pool = [...pool, ...fb].sort(() => Math.random() - 0.5); let wrongs = []; for (let i=0; i<pool.length; i++) { if (pool[i] !== correct && !wrongs.includes(pool[i])) { wrongs.push(pool[i]); if (wrongs.length === 3) break; } } return [{ text: correct, correct: true }, { text: wrongs[0]||"A", correct: false }, { text: wrongs[1]||"B", correct: false }, { text: wrongs[2]||"C", correct: false }].sort(() => Math.random() - 0.5); }
    function selectChoice(idx, el) { clearTimeout(studyNextTimer); let item = studyList[studyIndex]; let sel = item._choices[idx]; document.querySelectorAll('.choice-btn').forEach(b => b.style.pointerEvents = 'none'); if (sel.correct) { el.className = "choice-btn w-full bg-emerald-600 border border-emerald-500 p-3.5 rounded-2xl text-sm font-bold text-white transition text-left flex items-center justify-between scale-[1.02]"; el.querySelector('.res-icon').innerHTML = '<i class="fa-solid fa-check text-white text-lg"></i>'; el.querySelector('.res-icon').classList.remove('hidden'); doSpeak(item.word); studyNextTimer = setTimeout(() => { if (!document.getElementById('studyModal').classList.contains('hidden')) studyNext(); }, 1100); } else { el.className = "choice-btn w-full bg-rose-600 border border-rose-500 p-3.5 rounded-2xl text-sm font-bold text-white transition text-left flex items-center justify-between"; el.querySelector('.res-icon').innerHTML = '<i class="fa-solid fa-xmark text-white text-lg"></i>'; el.querySelector('.res-icon').classList.remove('hidden'); let cIdx = item._choices.findIndex(c=>c.correct); let cBtn = document.querySelectorAll('.choice-btn')[cIdx]; if (cBtn) cBtn.className = "choice-btn w-full bg-emerald-50 border border-emerald-400 p-3.5 rounded-2xl text-sm font-bold text-emerald-900 text-left flex items-center justify-between"; } }

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function speakInputText() { const v = document.getElementById('searchInput')?.value.trim(); if (v) doSpeak(v.split('/')[0]); }
    function doSpeak(t) { if (!('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.95; window.speechSynthesis.speak(u); }

    let isPlayingAll = false;
    function playAllWords() { let list = getWordsForCurrentView(); if (list.length === 0) { alert("읽어줄 단어가 없습니다."); return; } isPlayingAll = true; updatePlayUI(true); window.speechSynthesis.cancel(); let idx = 0; function readNext() { if (!isPlayingAll || idx >= list.length) { stopAllWords(); return; } const u = new SpeechSynthesisUtterance(list[idx].word); u.lang = 'en-US'; u.rate = 0.9; u.onend = () => setTimeout(() => { idx++; readNext(); }, 600); u.onerror = () => stopAllWords(); window.speechSynthesis.speak(u); } readNext(); }
    function stopAllWords() { isPlayingAll = false; window.speechSynthesis?.cancel(); updatePlayUI(false); }
    function updatePlayUI(playing) { document.querySelectorAll('#playAllBtn').forEach(b => { if (playing) { b.innerHTML = `<i class="fa-solid fa-stop"></i> 멈춤`; b.className = "bg-rose-600 hover:bg-rose-700 text-white px-3 py-2 rounded-xl text-xs font-bold shadow animate-pulse whitespace-nowrap"; b.setAttribute('onclick', 'stopAllWords()'); } else { b.innerHTML = `<i class="fa-solid fa-play"></i> 연속발음`; b.className = "bg-teal-600 hover:bg-teal-700 text-white px-3 py-2 rounded-xl text-xs font-bold shadow whitespace-nowrap"; b.setAttribute('onclick', 'playAllWords()'); } }); }

    function exportJsonFile() { const blob = new Blob([JSON.stringify({ folderTree, words }, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `wordbook_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); }
    function importJsonFile(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const res = JSON.parse(event.target.result); if (res.folderTree && res.words) { folderTree = res.folderTree; words = res.words; saveData(); renderFolders(); renderWords(); alert("복원 성공!"); } } catch(err) { alert("파일 오류"); } e.target.value = ''; }; reader.readAsText(file); }

    // ── 오프라인 감지 ──────────────────────────────────────
    window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.remove('hidden'));
    window.addEventListener('online', () => document.getElementById('offlineBanner').classList.add('hidden'));

    // ── PWA 서비스워커 등록 ────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW 등록 실패:', e));
    }
</script>
</body>
