<!DOCTYPE html>
<html lang="ko">
<head>

        ::-webkit-scrollbar-track { background: #f1f5f9; }

            #overlay.show { display: block; }
        }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const app = initializeApp({
        apiKey:"AIzaSyAeplPxURZu9o0OQAFY5RBh1BP0P0dLcSc",
        authDomain:"my-eng-wordbook.firebaseapp.com",
        projectId:"my-eng-wordbook",
        storageBucket:"my-eng-wordbook.firebasestorage.app",
        messagingSenderId:"613424514679",
        appId:"1:613424514679:web:94ecf9cc4898db06876872"
    });
    const db = getFirestore(app);
    const DATA_DOC = doc(db, 'wordbook', 'main');
    function showSync(msg, color) {
        ['syncDot','syncDot2'].forEach(id => { const el=document.getElementById(id); if(el) el.style.background=color; });
        const lb=document.getElementById('syncLabel'); if(lb) lb.textContent=msg;
        const t=document.getElementById('syncToast'), m=document.getElementById('syncMsg');
        if(m) m.textContent=msg;
        if(t){t.classList.remove('hidden');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.add('hidden'),2000);}
    }
    window._saveToFirestore = async (folderTree, words) => {
        try { showSync('저장 중...','#facc15'); await setDoc(DATA_DOC,{folderTree,words,updatedAt:Date.now()}); showSync('동기화됨','#34d399'); }
        catch(e) { showSync('저장 실패','#f87171'); }
    };
    onSnapshot(DATA_DOC, snap => {
        showSync('동기화됨','#34d399');
        window._initApp(snap.exists() ? snap.data() : null);
    }, () => { showSync('오프라인','#f87171'); window._initApp(null); });
</script>

<script>
const LS_TREE='smart_folders_tree_v3', LS_WORDS='smart_words_pro_v3';
let folderTree=[], words=[], activeFolderId='';
let sortMode='newest', isBlurMode=false, isHideMemorized=false, isHideExtra=false;
let editingWordId=null, currentActiveWord='';
let collapsedFolders=new Set(), movingWordId=null;
let currentView='words';

function getGeminiKey(){ return localStorage.getItem('gemini_api_key')||''; }
function setGeminiKey(){
    const cur=getGeminiKey();
    const key=prompt('Gemini API 키를 입력하세요:\n(aistudio.google.com → API Keys 에서 발급)\n\n현재: '+(cur?cur.slice(0,8)+'...':'미설정'));
    if(key?.trim()){ localStorage.setItem('gemini_api_key',key.trim()); alert('저장됐습니다!'); }
}

window._initApp = function(fireData){
    if(fireData){ folderTree=fireData.folderTree||[]; words=(fireData.words||[]).map(w=>normalizeWord(w,folderTree)); }
    else {
        const t=localStorage.getItem(LS_TREE);
        folderTree=t?JSON.parse(t):[{id:'f_root_0',name:'Day 1',parentId:null},{id:'f_root_1',name:'회화 표현',parentId:null},{id:'f_root_2',name:'수능 대비',parentId:null}];
        const w=localStorage.getItem(LS_WORDS);
        words=w?JSON.parse(w).map(x=>normalizeWord(x,folderTree)):[];
    }
    const saved=localStorage.getItem('smart_active_folder_id');
    activeFolderId=(saved&&folderTree.some(f=>f.id===saved))?saved:(folderTree[0]?.id||'');
    renderFolders(); renderCurrentView();
};

function normalizeWord(w,tree){
    if(typeof w.meaning==='string'){w.meanings=[w.meaning];delete w.meaning;}
    if(!w.meanings)w.meanings=['뜻 없음'];
    if(!Array.isArray(w.synonyms))w.synonyms=w.meanings.map(()=>'');
    while(w.synonyms.length<w.meanings.length)w.synonyms.push('');
    if(w.extraForms===undefined)w.extraForms='';
    if(typeof w.example==='string'){w.examples=w.example.trim()?[w.example.trim()]:[];delete w.example;}
    if(!w.examples)w.examples=[];
    if(w.folder&&!w.folderId){const t=tree.find(f=>f.name===w.folder);w.folderId=t?t.id:tree[0]?.id;delete w.folder;}
    if(w.memorized===undefined)w.memorized=false;
    return w;
}

function saveData(){
    localStorage.setItem(LS_TREE,JSON.stringify(folderTree));
    localStorage.setItem(LS_WORDS,JSON.stringify(words));
    localStorage.setItem('smart_active_folder_id',activeFolderId);
    if(window._saveToFirestore)window._saveToFirestore(folderTree,words);
}

// ── 뷰 전환 ──
function selectView(view){
    currentView=view;
    const statsItem=document.getElementById('statsMenuItem');
    if(view==='stats'){
        statsItem.classList.add('bg-indigo-700','text-white');
        statsItem.classList.remove('text-slate-400');
        document.getElementById('wordsView').classList.add('hidden');
        document.getElementById('statsView').classList.remove('hidden');
        renderStats();
    } else {
        statsItem.classList.remove('bg-indigo-700','text-white');
        statsItem.classList.add('text-slate-400');
        document.getElementById('wordsView').classList.remove('hidden');
        document.getElementById('statsView').classList.add('hidden');
        renderWords();
    }
    if(window.innerWidth<768) closeSidebar();
}

function renderCurrentView(){ currentView==='stats'?renderStats():renderWords(); }

// ── 사이드바 ──
function toggleSidebar(){
    const sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');
    if(window.innerWidth<768){sb.classList.toggle('open');ov.classList.toggle('show');}
    else sb.classList.toggle('collapsed');
}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

// ── 폴더 렌더링 ──
function renderFolders(){
    const area=document.getElementById('folderTreeArea'); if(!area)return;
    const roots=folderTree.filter(f=>f.parentId===null);
    area.innerHTML=roots.map(root=>{
        const isActive=root.id===activeFolderId&&currentView==='words';
        const children=folderTree.filter(f=>f.parentId===root.id);
        const isCollapsed=collapsedFolders.has(root.id);
        const childHtml=children.map(child=>{
            const ca=child.id===activeFolderId&&currentView==='words';
            return `<li class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition ${ca?'bg-indigo-600 text-white font-bold':'hover:bg-slate-800/80 text-slate-400 hover:text-slate-200'}"
                ondragover="event.preventDefault();this.classList.add('drag-over')"
                ondragleave="this.classList.remove('drag-over')"
                ondrop="dropWordToFolder('${child.id}',event);this.classList.remove('drag-over')"
                onclick="selectFolderView('${child.id}',event)">
                <div class="flex items-center gap-2 truncate"><i class="fa-solid fa-file-lines text-xs ${ca?'text-white':'text-slate-500'}"></i><span class="text-xs truncate">${child.name}</span></div>
                <div class="flex items-center gap-0.5 shrink-0">
                    <button onclick="renameFolder('${child.id}',event)" class="text-slate-500 hover:text-indigo-400 p-0.5"><i class="fa-solid fa-pen text-[9px]"></i></button>
                    <button onclick="deleteFolder('${child.id}',event)" class="text-slate-500 hover:text-rose-400 p-0.5"><i class="fa-solid fa-trash-can text-[9px]"></i></button>
                </div>
            </li>`;
        }).join('');
        return `<li class="flex flex-col mb-1">
            <div class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition ${isActive?'bg-indigo-600 text-white font-bold shadow-md':'hover:bg-slate-800 text-slate-300'}"
                ondragover="event.preventDefault();this.classList.add('drag-over')"
                ondragleave="this.classList.remove('drag-over')"
                ondrop="dropWordToFolder('${root.id}',event);this.classList.remove('drag-over')"
                onclick="selectFolderView('${root.id}',event)">
                <div class="flex items-center gap-2 truncate font-medium"><i class="fa-solid fa-folder${isActive?'-open text-white':' text-indigo-400'}"></i><span class="text-xs truncate">${root.name}</span></div>
                <div class="flex items-center gap-0.5 shrink-0">
                    ${children.length>0?`<button onclick="toggleFolderCollapse('${root.id}',event)" class="text-slate-400 hover:text-white p-0.5"><i class="fa-solid fa-chevron-${isCollapsed?'right':'down'} text-[9px]"></i></button>`:''}
                    <button onclick="addSubFolder('${root.id}',event)" class="text-slate-400 hover:text-white p-0.5"><i class="fa-solid fa-folder-plus text-xs"></i></button>
                    <button onclick="renameFolder('${root.id}',event)" class="text-slate-500 hover:text-indigo-400 p-0.5"><i class="fa-solid fa-pen text-[9px]"></i></button>
                    <button onclick="deleteFolder('${root.id}',event)" class="text-slate-500 hover:text-rose-400 p-0.5"><i class="fa-solid fa-trash-can text-[9px]"></i></button>
                </div>
            </div>
            ${(!isCollapsed&&children.length>0)?`<ul class="pl-5 mt-0.5 space-y-0.5 border-l border-slate-800 ml-3">${childHtml}</ul>`:''}
        </li>`;
    }).join('');
    updateFolderName();
}

function updateFolderName(){
    const cur=folderTree.find(f=>f.id===activeFolderId);
    if(cur){let d=cur.name;if(cur.parentId){const p=folderTree.find(f=>f.id===cur.parentId);if(p)d=`${p.name} > ${cur.name}`;}const el=document.getElementById('currentFolderName');if(el)el.innerText=d;}
}

function selectFolderView(id,e){
    e.stopPropagation(); stopAllWords();
    activeFolderId=id; localStorage.setItem('smart_active_folder_id',id);
    // Switch to words view
    currentView='words';
    document.getElementById('wordsView').classList.remove('hidden');
    document.getElementById('statsView').classList.add('hidden');
    const si=document.getElementById('statsMenuItem');
    si.classList.remove('bg-indigo-700','text-white'); si.classList.add('text-slate-400');
    renderFolders(); renderWords();
    if(window.innerWidth<768) closeSidebar();
}

function toggleFolderCollapse(id,e){e.stopPropagation();collapsedFolders.has(id)?collapsedFolders.delete(id):collapsedFolders.add(id);renderFolders();}
function addRootFolder(){const n=prompt("새 메인 폴더명:");if(!n?.trim())return;const id='f_'+Date.now();folderTree.push({id,name:n.trim(),parentId:null});activeFolderId=id;saveData();renderFolders();renderWords();}
function addSubFolder(pid,e){e.stopPropagation();const p=folderTree.find(f=>f.id===pid);const n=prompt(`[ ${p.name} ] 하위 폴더명:`);if(!n?.trim())return;const id='f_'+Date.now();folderTree.push({id,name:n.trim(),parentId:pid});activeFolderId=id;collapsedFolders.delete(pid);saveData();renderFolders();renderWords();}
function renameFolder(id,e){e.stopPropagation();const f=folderTree.find(x=>x.id===id);if(!f)return;const n=prompt("새 폴더 이름:",f.name);if(n?.trim()&&n.trim()!==f.name){f.name=n.trim();saveData();renderFolders();}}
function deleteFolder(id,e){e.stopPropagation();const all=[id,...folderTree.filter(f=>f.parentId===id).map(f=>f.id)];if(confirm("폴더와 내부 데이터를 삭제합니다.?")){folderTree=folderTree.filter(f=>!all.includes(f.id));words=words.filter(w=>!all.includes(w.folderId));if(all.includes(activeFolderId))activeFolderId=folderTree[0]?.id||'';saveData();renderFolders();renderWords();}}

// ── 단어 이동 ──
function dropWordToFolder(folderId,e){
    e.preventDefault();e.stopPropagation();
    const wId=parseInt(e.dataTransfer.getData('text/plain'));if(!wId)return;
    const w=words.find(x=>x.id===wId);
    if(w&&w.folderId!==folderId){w.folderId=folderId;saveData();renderWords();}
}
function openMoveModal(wordId){
    movingWordId=wordId;const w=words.find(x=>x.id===wordId);if(!w)return;
    document.getElementById('moveWordLabel').textContent=`"${w.word}" 을(를) 이동할 폴더 선택`;
    document.getElementById('moveFolderList').innerHTML=folderTree.map(f=>{
        const par=f.parentId?folderTree.find(x=>x.id===f.parentId):null;
        const lbl=par?`${par.name} > ${f.name}`:f.name;
        const isCur=f.id===w.folderId;
        return `<button onclick="moveWordToFolder('${f.id}')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium transition flex items-center gap-2 ${isCur?'bg-indigo-600 text-white':'bg-slate-50 hover:bg-indigo-50 text-slate-700'}">
            <i class="fa-solid fa-folder${isCur?'-open':''} text-${isCur?'white':'indigo-400'}"></i><span>${lbl}</span>${isCur?'<span class="ml-auto text-xs">현재</span>':''}
        </button>`;
    }).join('');
    document.getElementById('moveModal').classList.remove('hidden');
}
function moveWordToFolder(folderId){const w=words.find(x=>x.id===movingWordId);if(w&&w.folderId!==folderId){w.folderId=folderId;saveData();renderWords();}closeMoveModal();}
function closeMoveModal(){document.getElementById('moveModal').classList.add('hidden');movingWordId=null;}

// ── 데이터 헬퍼 ──
function getWordsForFolder(){
    const obj=folderTree.find(f=>f.id===activeFolderId);if(!obj)return[];
    let ids=[activeFolderId];
    if(obj.parentId===null)folderTree.filter(f=>f.parentId===obj.id).forEach(f=>ids.push(f.id));
    let list=words.filter(w=>ids.includes(w.folderId));
    if(sortMode==='alpha')list.sort((a,b)=>a.word.localeCompare(b.word));
    else if(sortMode==='oldest')list.sort((a,b)=>a.id-b.id);
    else list.sort((a,b)=>b.id-a.id);
    if(isHideMemorized)list=list.filter(w=>!w.memorized);
    return list;
}

// ── 통계 뷰 ──
function renderStats(){
    const total=words.length, mem=words.filter(w=>w.memorized).length;
    document.getElementById('statTotal').textContent=total;
    document.getElementById('statMemorized').textContent=mem;
    document.getElementById('statRate').textContent=total>0?Math.round(mem/total*100)+'%':'0%';
    const roots=folderTree.filter(f=>f.parentId===null);
    document.getElementById('statFolderTable').innerHTML=
        `<div class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">폴더별 현황</div>`+
        roots.map(root=>{
            const children=folderTree.filter(f=>f.parentId===root.id);
            const allIds=[root.id,...children.map(c=>c.id)];
            const fw=words.filter(w=>allIds.includes(w.folderId));
            const fm=fw.filter(w=>w.memorized).length;
            const pct=fw.length>0?Math.round(fm/fw.length*100):0;
            const childRows=children.map(child=>{
                const cw=words.filter(w=>w.folderId===child.id);
                const cm=cw.filter(w=>w.memorized).length;
                const cp=cw.length>0?Math.round(cm/cw.length*100):0;
                return `<div class="flex items-center gap-3 pl-6 py-1.5 border-t border-slate-50 text-xs">
                    <span class="text-slate-500 truncate flex-1"><i class="fa-solid fa-file-lines text-[10px] mr-1 text-slate-400"></i>${child.name}</span>
                    <span class="text-slate-500 w-10 text-right">${cw.length}개</span>
                    <span class="font-bold text-emerald-600 w-10 text-right">${cm}개</span>
                    <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" style="width:${cp}%"></div></div>
                    <span class="text-[10px] font-bold text-slate-400 w-8 text-right">${cp}%</span>
                </div>`;
            }).join('');
            return `<div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden mb-2">
                <div class="flex items-center gap-3 px-3 py-2.5 bg-white border-b border-slate-100 text-xs">
                    <span class="font-bold text-slate-700 truncate flex-1 text-sm"><i class="fa-solid fa-folder text-indigo-400 mr-1.5"></i>${root.name}</span>
                    <span class="text-slate-500 w-10 text-right">${fw.length}개</span>
                    <span class="font-bold text-emerald-600 w-10 text-right">${fm}개</span>
                    <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" style="width:${pct}%"></div></div>
                    <span class="text-[10px] font-bold text-slate-400 w-8 text-right">${pct}%</span>
                </div>${childRows}
            </div>`;
        }).join('');
    renderFilteredWords();
}

function renderFilteredWords(){
    const q=(document.getElementById('wordFilterInput')?.value||'').trim().toLowerCase();
    const container=document.getElementById('filteredWordResults');if(!container)return;
    if(!q){container.innerHTML='';return;}
    const matches=words.filter(w=>w.word.toLowerCase().includes(q)||w.meanings.some(m=>m.toLowerCase().includes(q)));
    if(matches.length===0){container.innerHTML='<p class="text-sm text-slate-400 text-center py-4">검색 결과 없음</p>';return;}
    container.innerHTML=matches.slice(0,30).map(w=>{
        const f=folderTree.find(x=>x.id===w.folderId);
        const fp=f?.parentId?folderTree.find(x=>x.id===f.parentId):null;
        const loc=fp?`${fp.name} > ${f?.name}`:(f?.name||'');
        return `<div class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-start gap-3">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="font-extrabold text-slate-900">${w.word}</span>
                    <button onclick="doSpeak('${w.word.replace(/'/g,"\\'")}')"><i class="fa-solid fa-volume-high text-indigo-500 text-xs"></i></button>
                    ${w.memorized?'<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full font-bold">암기완료</span>':''}
                </div>
                <div class="text-xs text-slate-600">${w.meanings.join(' / ')}</div>
                <div class="text-[10px] text-slate-400 mt-1"><i class="fa-solid fa-folder text-[9px] mr-1"></i>${loc}</div>
            </div>
            <button onclick="goToWord(${w.id})" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-xs px-2.5 py-1.5 rounded-lg font-bold transition shrink-0">이동</button>
        </div>`;
    }).join('')+(matches.length>30?`<p class="text-xs text-slate-400 text-center py-2">+${matches.length-30}개 더 있음</p>`:'');
}

function goToWord(wordId){
    const w=words.find(x=>x.id===wordId);if(!w)return;
    activeFolderId=w.folderId;localStorage.setItem('smart_active_folder_id',w.folderId);
    selectFolderView(w.folderId,{stopPropagation:()=>{}});
}

// ── Gemini 검색 ──
async function searchMeaning(){
    const txt=document.getElementById('searchInput')?.value.trim();if(!txt){alert("입력하세요.");return;}
    const ra=document.getElementById('searchResultArea');
    ra.innerHTML=`<div class="mt-3 text-center py-4 text-slate-400 text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i>검색 중...</div>`;
    if(txt.includes(' ')&&!txt.includes('/')){buildEditorCard(txt,'','',true);return;}
    const parts=txt.split('/').map(s=>s.trim()).filter(Boolean);
    const wordPart=parts[0], customMeanings=parts.slice(1);
    if(customMeanings.length>0){buildEditorCard(wordPart,'','',false,[],customMeanings,'');return;}

    const key=getGeminiKey();
    if(key){
        try{
            const prompt=`영어 단어 "${wordPart}"를 분석해 다음 JSON 형식으로만 응답하세요 (다른 텍스트 없이):
{"phonetic":"발음기호","meanings":["한국어뜻1","한국어뜻2"],"synonyms":["뜻1유의어","뜻2유의어"],"examples":["예문1","예문2"],"extraForms":"파생형 예: n.form / adj.form"}`;
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1}})
            });
            if(res.ok){
                const data=await res.json();
                const raw=data.candidates[0].content.parts[0].text;
                const json=JSON.parse(raw.replace(/```json\n?|\n?```/g,'').trim());
                buildEditorCardFull(wordPart,json); return;
            }
        }catch(e){console.warn('Gemini fallback:',e);}
    }
    // fallback
    let phonetic='', exArr=[], fetchedSyns='', extraForms='';
    try{
        const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(wordPart)}`);
        if(r.ok){
            const d=await r.json();
            phonetic=d[0]?.phonetic||d[0]?.phonetics?.find(p=>p.text)?.text||'';
            d[0].meanings.forEach(m=>{ m.definitions.forEach(def=>{ if(def.example&&exArr.length<3)exArr.push(def.example); }); });
            fetchedSyns=(d[0]?.meanings[0]?.synonyms||[]).slice(0,4).join(', ');
            const pos=[...new Set(d[0].meanings.map(m=>m.partOfSpeech))];
            if(pos.length>1) extraForms=pos.map(p=>p+'.').join(' / ');
        }
    }catch(e){}
    let koMean='';
    try{const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(wordPart)}`);koMean=(await r.json())[0][0][0]||'';}catch(e){}
    buildEditorCard(wordPart,phonetic,koMean,false,exArr,[],fetchedSyns,false,extraForms);
}

function buildEditorCardFull(word,json){
    currentActiveWord=word;
    const meanHtml=json.meanings.map((m,i)=>{
        const s=json.synonyms?.[i]||'';
        return `<div class="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in">
            <div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">${i+1}</span>
            <input type="text" value="${m}" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold text-slate-900 outline-none"></div>
            <div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span>
            <input type="text" value="${s}" placeholder="유의어" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div>
        </div>`;
    }).join('');
    const exHtml=(json.examples||[]).map((ex,i)=>exRow(ex,i+1)).join('')||exRow('',1);
    document.getElementById('searchResultArea').innerHTML=editorShell(word,json.phonetic||'',meanHtml,exHtml,json.extraForms||'',false,'AI');
    setTimeout(()=>document.querySelector('.mean-inp')?.focus(),50);
}

function buildEditorCard(wordTxt,phonetic,koMean,isSentence,fetchedExArr=[],injectedMeanings=[],fetchedSyns='',isEditMode=false,extraFormsVal=''){
    currentActiveWord=wordTxt;
    const meanHtml=injectedMeanings.length>0
        ?injectedMeanings.map((m,i)=>`<div class="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in"><div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">${i+1}</span><input type="text" value="${m}" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold outline-none"><button onclick="this.parentElement.parentElement.remove();reindexMeanings();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" placeholder="유의어" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div></div>`).join('')
        :`<div class="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in"><div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">1</span><input type="text" value="${koMean}" placeholder="뜻 입력" onkeydown="if(event.key==='Enter')saveActiveWord()" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold outline-none"></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" value="${fetchedSyns}" placeholder="유의어" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div></div>`;
    const exList=isSentence?[wordTxt]:(Array.isArray(fetchedExArr)?fetchedExArr:[]);
    const exHtml=exList.length>0?exList.map((ex,i)=>exRow(ex,i+1)).join(''):exRow('',1);
    document.getElementById('searchResultArea').innerHTML=editorShell(wordTxt,phonetic,meanHtml,exHtml,extraFormsVal,isEditMode,'');
    setTimeout(()=>document.querySelector('.mean-inp')?.focus(),50);
}

function exRow(val,n){return `<div class="flex items-center gap-2 ex-item"><span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">${n}</span><input type="text" value="${val.replace(/"/g,'&quot;')}" placeholder="${n}번째 예문" onkeydown="if(event.key==='Enter')saveActiveWord()" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white outline-none"></div>`;}

function editorShell(word,phonetic,meanHtml,exHtml,extraVal,isEdit,badge){
    const sp=`<button onclick="doSpeak('${word.replace(/'/g,"\\'")}')"><i class="fa-solid fa-volume-high text-indigo-600"></i></button>`;
    const titleBar=isEdit
        ?`<span class="text-amber-800 font-black flex items-center gap-1.5 text-sm"><i class="fa-solid fa-pen-to-square text-amber-600"></i> [ ${word} ] 수정 중...</span>`
        :`<div class="flex items-baseline gap-2"><span class="text-xl font-black text-slate-900 truncate">${word}</span><span class="text-indigo-600 font-mono text-sm">${phonetic}</span>${badge?`<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">${badge}</span>`:''}</div>`;
    const saveBtn=isEdit
        ?`<button onclick="saveActiveWord()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-xl text-sm font-black shadow-md transition flex items-center gap-1.5"><i class="fa-solid fa-check"></i> 수정 완료</button>`
        :`<button onclick="saveActiveWord()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl text-sm font-black shadow-md transition">⭐ 단어 저장</button>`;
    const border=isEdit?'bg-amber-50/95 border-2 border-amber-400/80':'bg-indigo-50/95 border border-indigo-200';
    return `<div class="${border} rounded-2xl p-4 mt-3 mb-2 shadow-md animate-fade-in">
        <div class="flex justify-between items-center mb-3 pb-2 border-b ${isEdit?'border-amber-200':'border-indigo-100'}">${titleBar}${sp}</div>
        <div class="mb-3"><div class="flex justify-between items-center mb-2"><label class="text-xs font-bold text-slate-900">뜻 &amp; 유의어</label><button onclick="addMeaningInput()" class="bg-indigo-600 text-white text-xs px-2.5 py-1 rounded-lg font-bold flex items-center gap-1"><i class="fa-solid fa-plus text-[10px]"></i> 추가</button></div><div id="meanGroup" class="space-y-2">${meanHtml}</div></div>
        <div class="mb-3 bg-white p-3 rounded-xl border ${isEdit?'border-amber-200':'border-indigo-100'}"><label class="text-xs font-bold text-slate-800 block mb-1">🔗 파생형</label><input type="text" id="extraFormsInp" value="${extraVal}" placeholder="예: n. form / adj. form" class="w-full px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none font-medium"></div>
        <div class="mb-3 bg-white/80 p-3 rounded-xl border ${isEdit?'border-amber-200':'border-indigo-100'}"><div class="flex justify-between items-center mb-2"><label class="text-xs font-bold text-slate-700 flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="useExCheck" checked onclick="toggleExampleInputs()" class="accent-indigo-600 w-4 h-4"><span>✍️ 예문</span></label><button onclick="addExampleInput()" id="addExBtn" class="bg-white border border-slate-300 text-slate-700 text-xs px-2 py-1 rounded-lg font-bold flex items-center gap-1"><i class="fa-solid fa-plus text-[10px]"></i> 추가</button></div><div id="exGroup" class="space-y-1.5">${exHtml}</div></div>
        <div class="flex justify-end gap-2"><button onclick="document.getElementById('searchResultArea').innerHTML='';editingWordId=null;" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold transition">닫기</button>${saveBtn}</div>
    </div>`;
}

function addMeaningInput(){const w=document.getElementById('meanGroup');const c=w.children.length+1;const d=document.createElement('div');d.className="mean-item bg-slate-100/80 p-3 rounded-xl border border-slate-200 space-y-1.5 animate-fade-in";d.innerHTML=`<div class="flex items-center gap-2"><span class="num-badge bg-indigo-600 text-white font-mono text-xs px-2 py-0.5 rounded font-bold">${c}</span><input type="text" placeholder="${c}번째 뜻" onkeydown="if(event.key==='Enter')saveActiveWord()" class="mean-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white font-bold outline-none focus:border-indigo-600"><button onclick="this.parentElement.parentElement.remove();reindexMeanings();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-2 pl-7"><span class="text-[11px] font-extrabold text-purple-700">≒</span><input type="text" placeholder="유의어" class="syn-inp flex-1 px-2.5 py-1 text-xs border border-purple-200 bg-white rounded-lg focus:outline-none focus:border-purple-500 text-purple-950 font-medium"></div>`;w.appendChild(d);d.querySelector('.mean-inp').focus();}
function addExampleInput(){const w=document.getElementById('exGroup');const c=w.children.length+1;const d=document.createElement('div');d.className="flex items-center gap-2 ex-item";d.innerHTML=`<span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">${c}</span><input type="text" placeholder="${c}번째 예문" onkeydown="if(event.key==='Enter')saveActiveWord()" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white outline-none"><button onclick="this.parentElement.remove();reindexExamples();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button>`;w.appendChild(d);d.querySelector('input').focus();}
function reindexMeanings(){document.querySelectorAll('#meanGroup .mean-item').forEach((el,i)=>{el.querySelector('.num-badge').innerText=i+1;el.querySelector('.mean-inp').placeholder=`${i+1}번째 뜻`;});}
function reindexExamples(){document.querySelectorAll('#exGroup .ex-item').forEach((el,i)=>{el.querySelector('.ex-badge').innerText=i+1;el.querySelector('input').placeholder=`${i+1}번째 예문`;});}
function toggleExampleInputs(){const on=document.getElementById('useExCheck').checked;document.getElementById('exGroup').style.display=on?'block':'none';document.getElementById('addExBtn').style.display=on?'inline-flex':'none';}

function openWordEditor(id){
    const item=words.find(w=>w.id===id);if(!item)return;editingWordId=item.id;
    buildEditorCard(item.word,'','',false,[],item.meanings,'',true,item.extraForms||'');
    setTimeout(()=>{
        document.querySelectorAll('#meanGroup .mean-item').forEach((row,idx)=>{const s=row.querySelector('.syn-inp');if(s&&item.synonyms[idx])s.value=item.synonyms[idx];});
        const eg=document.getElementById('exGroup');if(eg)eg.innerHTML=item.examples.map((ex,i)=>`<div class="flex items-center gap-2 ex-item"><span class="ex-badge bg-slate-300 text-slate-700 font-mono text-xs px-2 py-1 rounded font-bold">${i+1}</span><input type="text" value="${ex.replace(/"/g,'&quot;')}" class="ex-inp flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs bg-white outline-none"><button onclick="this.parentElement.remove();reindexExamples();" class="text-slate-400 hover:text-rose-600 px-1"><i class="fa-solid fa-xmark"></i></button></div>`).join('');
    },50);
}

function saveActiveWord(){
    const mArr=[],sArr=[];
    document.querySelectorAll('#meanGroup .mean-item').forEach(item=>{const m=item.querySelector('.mean-inp').value.trim(),s=item.querySelector('.syn-inp').value.trim();if(m){mArr.push(m);sArr.push(s);}});
    if(mArr.length===0){alert("뜻을 1개 이상 입력하세요.");return;}
    const eArr=[];if(document.getElementById('useExCheck')?.checked)document.querySelectorAll('#exGroup .ex-inp').forEach(i=>{if(i.value.trim())eArr.push(i.value.trim());});
    const extra=document.getElementById('extraFormsInp')?.value.trim()||'';
    if(editingWordId){const t=words.find(w=>w.id===editingWordId);if(t){t.meanings=mArr;t.synonyms=sArr;t.examples=eArr;t.extraForms=extra;}}
    else words.unshift({id:Date.now(),folderId:activeFolderId,word:currentActiveWord,meanings:mArr,synonyms:sArr,extraForms:extra,examples:eArr,memorized:false});
    editingWordId=null;saveData();renderWords();
    document.getElementById('searchInput').value='';
    document.getElementById('searchResultArea').innerHTML='';
}

// ── 단어 목록 (1열 가로 카드) ──
function renderWords(){
    if(currentView!=='words')return;
    updateFolderName();
    const list=document.getElementById('wordListArea');if(!list)return;
    const data=getWordsForFolder();
    const isRootView=folderTree.find(f=>f.id===activeFolderId)?.parentId===null;
    if(data.length===0){
        list.innerHTML=`<div class="py-16 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200 font-medium">${isHideMemorized?'모든 단어를 암기하셨습니다! 🎉':'단어가 없습니다. 위에서 검색하여 추가하세요!'}</div>`;
        return;
    }
    const blurCss=isBlurMode?'filter blur-sm hover:blur-none transition duration-300':'';
    list.innerHTML=data.map(w=>{
        const rf=folderTree.find(f=>f.id===w.folderId);
        const badge=(isRootView&&rf&&rf.id!==activeFolderId)?rf.name:'';
        const meanRows=w.meanings.map((m,idx)=>{
            const syn=w.synonyms[idx];
            const synHtml=(!isHideExtra&&syn)?`<div class="text-[11px] font-bold text-purple-700 pl-6 mt-0.5"><span class="bg-purple-100/80 px-1.5 py-0.5 rounded text-[9px] font-mono mr-1">유의어</span>${syn}</div>`:'';
            return `<div class="leading-snug"><div class="flex items-start gap-2 text-xs font-bold text-slate-900"><span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[9px] font-mono shrink-0 mt-0.5">${idx+1}</span><span class="${blurCss} break-words flex-1">${m}</span></div>${synHtml}</div>`;
        }).join('');
        const extraHtml=(!isHideExtra&&w.extraForms)?`<div class="pt-2 border-t border-slate-200/60 text-[11px] text-slate-600 font-medium"><span class="bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded text-[9px] font-mono mr-1">파생/문법</span>${w.extraForms}</div>`:'';
        const exHtml=w.examples.length>0?`<div class="mt-3 pt-3 border-t border-slate-100 space-y-1.5 w-full text-left"><span class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider block mb-1">Examples</span>${w.examples.map((ex,i)=>`<div class="flex items-start justify-between gap-1.5 bg-slate-50/80 hover:bg-indigo-50/40 p-2 rounded-xl transition group/ex border border-transparent hover:border-indigo-100"><div class="flex items-start gap-1.5 flex-1"><span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono mt-0.5">${i+1}</span><span class="text-xs text-slate-600 italic leading-relaxed break-all flex-1">${ex}</span></div><button onclick="doSpeak('${ex.replace(/'/g,"\\'")}' )" class="text-slate-400 hover:text-indigo-600 p-1 transition opacity-0 group-hover/ex:opacity-100 shrink-0"><i class="fa-solid fa-volume-high text-xs"></i></button></div>`).join('')}</div>`:'';
        return `<div class="bg-white border ${w.memorized?'border-emerald-300 bg-emerald-50/25':'border-slate-200 hover:border-indigo-300'} rounded-2xl p-5 shadow-sm hover:shadow-md transition flex flex-col justify-between group"
            draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${w.id}')">
            <div>
                <div class="flex items-start justify-between gap-3 mb-3.5">
                    <div class="flex items-baseline gap-2 min-w-0 flex-1">
                        <span class="font-extrabold text-xl text-slate-900 break-words select-text">${w.word}</span>
                        <button onclick="doSpeak('${w.word.replace(/'/g,"\\'")}' )" class="text-slate-400 hover:text-indigo-600 p-1 shrink-0 transition"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <button onclick="toggleCardMemorized(${w.id})" class="shrink-0 text-[11px] px-2.5 py-1 rounded-full font-extrabold transition flex items-center gap-1 shadow-sm ${w.memorized?'bg-emerald-600 text-white hover:bg-emerald-700':'bg-slate-100 text-slate-400 hover:bg-slate-200'}">
                        <i class="fa-solid ${w.memorized?'fa-check':'fa-brain'}"></i><span>${w.memorized?'암기완료':'미암기'}</span>
                    </button>
                </div>
                <div onclick="openWordEditor(${w.id})" class="w-full bg-slate-50 hover:bg-indigo-50/50 p-3.5 rounded-xl cursor-pointer border border-transparent hover:border-indigo-100 transition space-y-2 group/edit" title="클릭하여 편집">
                    ${meanRows}${extraHtml}
                    <div class="text-[10px] text-slate-400 group-hover/edit:text-indigo-600 text-right opacity-0 group-hover/edit:opacity-100 transition pt-0.5"><i class="fa-solid fa-pen"></i> 상세 편집</div>
                </div>
                ${exHtml}
            </div>
            <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
                <div class="text-[10px] font-extrabold text-indigo-500">${badge?`<span class="bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">📁 ${badge}</span>`:''}</div>
                <div class="flex items-center gap-2">
                    <button onclick="openMoveModal(${w.id})" class="text-slate-300 hover:text-blue-500 text-xs transition" title="폴더 이동"><i class="fa-solid fa-folder-open"></i></button>
                    <button onclick="deleteWord(${w.id})" class="text-slate-300 hover:text-rose-500 text-xs transition flex items-center gap-1 font-medium"><i class="fa-solid fa-trash-can"></i> 삭제</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function deleteWord(id){words=words.filter(w=>w.id!==id);saveData();renderWords();}
function toggleCardMemorized(id){const item=words.find(w=>w.id===id);if(!item)return;item.memorized=!item.memorized;saveData();renderWords();}
function toggleHideExtra(){isHideExtra=!isHideExtra;document.getElementById('hideExtraBtn').innerHTML=isHideExtra?`<span class="text-purple-600 font-extrabold">부가정보 숨김</span>`:`부가정보`;renderWords();}
function toggleHideMemorized(){isHideMemorized=!isHideMemorized;document.getElementById('hideMemBtn').innerHTML=isHideMemorized?`<span class="text-rose-600 font-extrabold">암기숨김 ON</span>`:`암기숨김`;renderWords();}
function toggleBlurMode(){isBlurMode=!isBlurMode;document.getElementById('blurBtn').innerHTML=isBlurMode?`<span class="text-indigo-600 font-bold">뜻가리기 ON</span>`:`뜻가리기`;renderWords();}
function toggleSortMode(){const b=document.getElementById('sortBtn');if(sortMode==='newest'){sortMode='oldest';b.innerHTML=`<i class="fa-solid fa-arrow-up-1-9 text-indigo-600"></i> <span class="text-indigo-600 font-extrabold">오래된순</span>`;}else if(sortMode==='oldest'){sortMode='alpha';b.innerHTML=`<i class="fa-solid fa-arrow-down-z-a text-purple-600"></i> <span class="text-purple-600 font-extrabold">A-Z순</span>`;}else{sortMode='newest';b.innerHTML=`<i class="fa-solid fa-arrow-down-9-1 text-slate-400"></i> 최신순`;}renderWords();}

// ── 학습 모달 ──
let studyList=[],studyIndex=0,studyMode='flashcard',fcFlipped=false,isShuffleOn=false,studyNextTimer=null;
let wrongWords=[], retryRound=1;

function openStudyModal(){
    studyList=getWordsForFolder();
    if(studyList.length===0){alert("학습할 단어가 없습니다.");return;}
    studyIndex=0;fcFlipped=false;wrongWords=[];retryRound=1;
    if(isShuffleOn)shuffleStudyList();
    document.getElementById('studyModal').classList.remove('hidden');
    document.getElementById('retryBadge').classList.add('hidden');
    setStudyMode('flashcard');
    window.addEventListener('keydown',handleStudyKeys);
}
function closeStudyModal(){clearTimeout(studyNextTimer);document.getElementById('studyModal').classList.add('hidden');window.removeEventListener('keydown',handleStudyKeys);renderWords();}
function handleStudyKeys(e){if(e.key==='Escape'){closeStudyModal();return;}if(studyMode==='flashcard'&&(e.key===' '||e.key==='Spacebar')){e.preventDefault();fcFlipped=!fcFlipped;renderStudyCanvas();}else if(e.key==='ArrowLeft'&&document.activeElement?.tagName!=='INPUT')studyPrev();else if(e.key==='ArrowRight'&&document.activeElement?.tagName!=='INPUT')studyNext();}
function setStudyMode(mode){clearTimeout(studyNextTimer);studyMode=mode;fcFlipped=false;document.querySelectorAll('.study-tab').forEach(b=>b.className="px-2.5 py-1.5 rounded-lg study-tab text-slate-400 hover:text-white whitespace-nowrap");document.getElementById('tab_'+mode).className="px-2.5 py-1.5 rounded-lg study-tab bg-indigo-600 text-white font-extrabold whitespace-nowrap";renderStudyCanvas();}
function toggleShuffleMode(){isShuffleOn=!isShuffleOn;const btn=document.getElementById('studyShuffleBtn');clearTimeout(studyNextTimer);if(isShuffleOn){btn.innerHTML=`<i class="fa-solid fa-shuffle text-amber-400"></i> <span class="text-amber-400 font-extrabold">랜덤: ON</span>`;shuffleStudyList();}else{btn.innerHTML=`<i class="fa-solid fa-shuffle"></i> <span>랜덤: OFF</span>`;studyList=getWordsForFolder();}studyIndex=0;fcFlipped=false;renderStudyCanvas();}
function shuffleStudyList(){for(let i=studyList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[studyList[i],studyList[j]]=[studyList[j],studyList[i]];}}
function studyPrev(){clearTimeout(studyNextTimer);if(studyIndex>0){studyIndex--;fcFlipped=false;renderStudyCanvas();}else alert("첫 단어입니다.");}

function studyNext(){
    clearTimeout(studyNextTimer);
    if(studyIndex<studyList.length-1){studyIndex++;fcFlipped=false;renderStudyCanvas();return;}
    // 라운드 종료
    const unique=[...new Map(wrongWords.map(w=>[w.id,w])).values()];
    if(unique.length>0){
        wrongWords=[];retryRound++;
        studyList=unique;studyIndex=0;fcFlipped=false;
        const badge=document.getElementById('retryBadge');
        badge.textContent=`재학습 ${retryRound-1}회차`;badge.classList.remove('hidden');
        const canvas=document.getElementById('studyCanvas');
        canvas.innerHTML=`<div class="text-center"><i class="fa-solid fa-rotate-right text-5xl text-amber-400 mb-4"></i><p class="text-2xl font-black text-slate-800">재학습 시작</p><p class="text-slate-500 mt-2 text-sm">틀린 단어 <strong>${studyList.length}개</strong>를 다시 학습합니다</p></div>`;
        studyNextTimer=setTimeout(()=>renderStudyCanvas(),1800);
    } else {
        document.getElementById('studyCanvas').innerHTML=`<div class="text-center"><i class="fa-solid fa-trophy text-5xl text-amber-400 mb-4"></i><p class="text-2xl font-black text-slate-800">완료! 🎉</p><p class="text-slate-500 mt-2 text-sm">모든 단어를 맞혔습니다</p><button onclick="closeStudyModal()" class="mt-5 bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm">닫기</button></div>`;
    }
}

function addWrongWord(item){if(!wrongWords.some(w=>w.id===item.id))wrongWords.push(item);}

function renderStudyMemBtn(){
    const item=studyList[studyIndex];const b=document.getElementById('studyMemBtn');if(!item||!b)return;
    if(item.memorized){b.innerHTML=`<i class="fa-solid fa-circle-check text-emerald-400 text-lg"></i> <span>암기 완료</span>`;b.className="flex-1 py-3 rounded-2xl font-extrabold text-sm transition border flex items-center justify-center gap-2 shadow-lg bg-emerald-950/80 border-emerald-500 text-emerald-200";}
    else{b.innerHTML=`<i class="fa-solid fa-brain text-amber-400 text-lg"></i> <span>암기 완료로 체크</span>`;b.className="flex-1 py-3 rounded-2xl font-extrabold text-sm transition border flex items-center justify-center gap-2 shadow-lg bg-slate-800 hover:bg-slate-700 border-slate-700 text-slate-200";}
}
function toggleStudyMemorized(){const item=studyList[studyIndex];if(!item)return;item.memorized=!item.memorized;const t=words.find(w=>w.id===item.id);if(t)t.memorized=item.memorized;saveData();renderStudyMemBtn();}

function renderStudyCanvas(){
    const item=studyList[studyIndex];if(!item)return;
    document.getElementById('studyProgress').innerText=`${studyIndex+1} / ${studyList.length}`;
    renderStudyMemBtn();
    const canvas=document.getElementById('studyCanvas');

    if(studyMode==='flashcard'){
        if(!fcFlipped){
            canvas.innerHTML=`<div class="absolute top-4 right-4"><button onclick="event.stopPropagation();doSpeak('${item.word.replace(/'/g,"\\'")}' )" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-indigo-50 text-slate-600 flex items-center justify-center text-lg transition"><i class="fa-solid fa-volume-high"></i></button></div>
<span class="text-xs font-extrabold text-indigo-600 uppercase tracking-widest mb-3 block">Word</span>
<h3 onclick="fcFlipped=!fcFlipped;renderStudyCanvas();" class="text-4xl sm:text-6xl font-black text-slate-900 cursor-pointer py-4 break-all">${item.word}</h3>
<div class="absolute bottom-4 text-xs text-slate-400 animate-pulse">탭하면 뜻 공개</div>`;
            doSpeak(item.word);
        } else {
            const mHtml=item.meanings.map((m,i)=>{const s=item.synonyms[i]?`<span class="text-xs font-bold text-purple-600 ml-2">≒ ${item.synonyms[i]}</span>`:'';return `<div class="flex items-start gap-2 text-left font-bold text-lg sm:text-2xl text-slate-900"><span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-lg text-sm mt-0.5 font-mono shrink-0">${i+1}</span><div class="flex-1">${m}${s}</div></div>`;}).join('');
            canvas.innerHTML=`<div class="absolute top-4 right-4"><button onclick="event.stopPropagation();doSpeak('${item.word.replace(/'/g,"\\'")}' )" class="w-10 h-10 rounded-xl bg-slate-100 hover:bg-indigo-50 text-slate-600 flex items-center justify-center text-lg transition"><i class="fa-solid fa-volume-high"></i></button></div>
<span class="text-xs font-extrabold text-emerald-600 uppercase tracking-widest mb-3 block">Meanings</span>
<div onclick="fcFlipped=!fcFlipped;renderStudyCanvas();" class="space-y-3 w-full max-w-lg mx-auto overflow-y-auto max-h-52 cursor-pointer">${mHtml}</div>
${item.examples[0]?`<div class="mt-4 pt-4 border-t border-slate-100 w-full max-w-lg text-left"><span class="text-[10px] font-extrabold text-slate-400 uppercase block mb-1">Example</span><p class="text-sm text-slate-600 italic">"${item.examples[0]}"</p></div>`:''}
<div class="absolute bottom-4 text-xs text-slate-400">다시 탭하면 앞면 복귀</div>`;
        }
    } else if(studyMode==='spelling'){
        canvas.innerHTML=`<span class="text-xs font-extrabold text-amber-600 uppercase tracking-widest mb-2 block">✍️ 뜻을 보고 영어 단어를 입력하세요</span>
<div class="text-lg sm:text-2xl font-black text-slate-900 mb-6 bg-slate-100 px-6 py-4 rounded-2xl max-w-lg w-full break-all">${item.meanings.join(', ')}</div>
<div class="flex gap-2 max-w-sm w-full"><input type="text" id="spellInp" placeholder="철자 입력" onkeydown="if(event.key==='Enter')checkSpell()" class="flex-1 bg-white border border-slate-300 rounded-2xl px-4 py-3 text-center text-xl font-bold text-slate-900 focus:outline-none focus:border-indigo-600 tracking-wider" autocomplete="off"><button onclick="checkSpell()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-3 rounded-2xl text-sm transition">확인</button></div>
<div id="spellFb" class="mt-4 min-h-[28px] text-sm font-extrabold"></div>`;
        setTimeout(()=>document.getElementById('spellInp')?.focus(),50);
    } else if(studyMode==='choice'){
        doSpeak(item.word);
        if(!item._choices||isShuffleOn)item._choices=generateChoices(item);
        const btns=item._choices.map((ch,idx)=>`<button onclick="selectChoice(${idx},this)" class="choice-btn w-full bg-slate-50 hover:bg-indigo-50/60 border border-slate-200 p-3.5 rounded-2xl text-sm font-bold text-slate-700 transition text-left flex items-center justify-between group/cb"><span><span class="text-xs bg-white group-hover/cb:bg-indigo-600 text-slate-500 group-hover/cb:text-white border border-slate-200 px-2 py-0.5 rounded-lg mr-2 font-mono transition">${idx+1}</span>${ch.text}</span><span class="res-icon hidden ml-2"></span></button>`).join('');
        canvas.innerHTML=`<span class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2 block">Word</span>
<h3 class="text-4xl sm:text-5xl font-black text-slate-900 select-text mb-6 break-all">${item.word}</h3>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5 w-full max-w-xl">${btns}</div>`;
    } else if(studyMode==='blank'){
        const ex=item.examples[0];
        if(!ex){canvas.innerHTML=`<i class="fa-solid fa-circle-exclamation text-4xl text-amber-500 mb-3 block"></i><p class="text-base font-bold text-slate-800">등록된 예문이 없습니다.</p>`;return;}
        let reg=new RegExp(escapeRegExp(item.word),'gi');let masked=ex.replace(reg,`<span class="mx-1 text-amber-600 font-mono underline font-bold">[ ________ ]</span>`);
        if(masked===ex){const sr=new RegExp('\\b'+escapeRegExp(item.word.slice(0,4))+'\\w*','gi');masked=ex.replace(sr,`<span class="mx-1 text-amber-600 font-mono underline font-bold">[ ________ ]</span>`);}
        canvas.innerHTML=`<span class="text-xs font-extrabold text-teal-600 uppercase tracking-widest mb-2 block">🕳️ 빈칸을 맞혀보세요</span>
<div class="text-base sm:text-lg font-medium text-slate-800 mb-3 max-w-lg leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-200">"${masked}"</div>
<div class="text-xs font-bold text-indigo-900 mb-5 bg-indigo-50 border border-indigo-200 px-3 py-2 rounded-xl">💡 힌트: ${item.meanings.join(', ')}</div>
<div class="flex gap-2 max-w-sm w-full"><input type="text" id="blankInp" placeholder="정답 입력" onkeydown="if(event.key==='Enter')checkBlank()" class="flex-1 bg-white border border-slate-300 rounded-2xl px-4 py-3 text-center text-lg font-bold text-slate-900 focus:outline-none focus:border-teal-600" autocomplete="off"><button onclick="checkBlank()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold px-5 py-3 rounded-2xl text-sm transition">확인</button></div>
<div id="blankFb" class="mt-4 min-h-[28px] text-sm font-extrabold"></div>`;
        setTimeout(()=>document.getElementById('blankInp')?.focus(),50);
    }
}

function checkSpell(){
    clearTimeout(studyNextTimer);
    const u=document.getElementById('spellInp')?.value.trim().toLowerCase(),r=studyList[studyIndex].word.toLowerCase(),fb=document.getElementById('spellFb');if(!fb)return;
    if(u===r){fb.innerHTML=`<span class="text-emerald-600 font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 정답!</span>`;doSpeak(r);}
    else{addWrongWord(studyList[studyIndex]);fb.innerHTML=`<span class="text-rose-600">오답 — 정답: <strong class="underline font-mono">${studyList[studyIndex].word}</strong></span>`;}
    studyNextTimer=setTimeout(()=>{if(!document.getElementById('studyModal').classList.contains('hidden'))studyNext();},1400);
}

function checkBlank(){
    clearTimeout(studyNextTimer);
    const u=document.getElementById('blankInp')?.value.trim().toLowerCase(),r=studyList[studyIndex].word.toLowerCase(),fb=document.getElementById('blankFb');if(!fb)return;
    if(u===r){fb.innerHTML=`<span class="text-emerald-600 font-black flex items-center justify-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 정답!</span>`;doSpeak(studyList[studyIndex].examples[0]);}
    else{addWrongWord(studyList[studyIndex]);fb.innerHTML=`<span class="text-rose-600">오답 — 정답: <strong class="underline font-mono">${studyList[studyIndex].word}</strong></span>`;}
    studyNextTimer=setTimeout(()=>{if(!document.getElementById('studyModal').classList.contains('hidden'))studyNext();},1500);
}

function generateChoices(target){
    const correct=target.meanings[0]||'뜻 없음';
    let pool=words.filter(w=>w.id!==target.id).map(w=>w.meanings[0]).filter(Boolean);
    const fb=['매우 아름다운','개발을 진행하다','갑작스러운 사고','전통적인 문화','위험을 감수하다'];
    pool=[...pool,...fb].sort(()=>Math.random()-0.5);
    const wrongs=[];for(let i=0;i<pool.length;i++){if(pool[i]!==correct&&!wrongs.includes(pool[i])){wrongs.push(pool[i]);if(wrongs.length===3)break;}}
    return[{text:correct,correct:true},{text:wrongs[0]||'A',correct:false},{text:wrongs[1]||'B',correct:false},{text:wrongs[2]||'C',correct:false}].sort(()=>Math.random()-0.5);
}

function selectChoice(idx,el){
    clearTimeout(studyNextTimer);
    const item=studyList[studyIndex],sel=item._choices[idx];
    document.querySelectorAll('.choice-btn').forEach(b=>b.style.pointerEvents='none');
    if(sel.correct){
        el.className="choice-btn w-full bg-emerald-600 border border-emerald-500 p-3.5 rounded-2xl text-sm font-bold text-white text-left flex items-center justify-between";
        el.querySelector('.res-icon').innerHTML='<i class="fa-solid fa-check text-white text-lg"></i>';el.querySelector('.res-icon').classList.remove('hidden');
        doSpeak(item.word);
    } else {
        addWrongWord(item);
        el.className="choice-btn w-full bg-rose-600 border border-rose-500 p-3.5 rounded-2xl text-sm font-bold text-white text-left flex items-center justify-between";
        el.querySelector('.res-icon').innerHTML='<i class="fa-solid fa-xmark text-white text-lg"></i>';el.querySelector('.res-icon').classList.remove('hidden');
        const ci=item._choices.findIndex(c=>c.correct),cb=document.querySelectorAll('.choice-btn')[ci];
        if(cb)cb.className="choice-btn w-full bg-emerald-50 border border-emerald-400 p-3.5 rounded-2xl text-sm font-bold text-emerald-900 text-left flex items-center justify-between";
    }
    studyNextTimer=setTimeout(()=>{if(!document.getElementById('studyModal').classList.contains('hidden'))studyNext();},1400);
}

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function speakInputText(){const v=document.getElementById('searchInput')?.value.trim();if(v)doSpeak(v.split('/')[0]);}
function doSpeak(t){if(!('speechSynthesis'in window)||!t)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.95;window.speechSynthesis.speak(u);}

let isPlayingAll=false;
function playAllWords(){const list=getWordsForFolder();if(list.length===0){alert("읽어줄 단어가 없습니다.");return;}isPlayingAll=true;updatePlayUI(true);window.speechSynthesis.cancel();let idx=0;(function readNext(){if(!isPlayingAll||idx>=list.length){stopAllWords();return;}const u=new SpeechSynthesisUtterance(list[idx].word);u.lang='en-US';u.rate=0.9;u.onend=()=>setTimeout(()=>{idx++;readNext();},600);u.onerror=()=>stopAllWords();window.speechSynthesis.speak(u);})();}
function stopAllWords(){isPlayingAll=false;window.speechSynthesis?.cancel();updatePlayUI(false);}
function updatePlayUI(playing){const b=document.getElementById('playAllBtn');if(!b)return;if(playing){b.innerHTML=`<i class="fa-solid fa-stop text-xs"></i> 멈춤`;b.className="bg-rose-600 hover:bg-rose-700 text-white px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow animate-pulse whitespace-nowrap shrink-0";b.setAttribute('onclick','stopAllWords()');}else{b.innerHTML=`<i class="fa-solid fa-play text-xs"></i> 연속발음`;b.className="bg-teal-600 hover:bg-teal-700 text-white px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow whitespace-nowrap shrink-0";b.setAttribute('onclick','playAllWords()');}}

function exportJsonFile(){const blob=new Blob([JSON.stringify({folderTree,words},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wordbook_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);}
function importJsonFile(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const res=JSON.parse(ev.target.result);if(res.folderTree&&res.words){folderTree=res.folderTree;words=res.words;saveData();renderFolders();renderWords();alert("복원 성공!");}}catch(err){alert("파일 오류");}e.target.value='';};reader.readAsText(file);}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
